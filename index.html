    const resp = await fetch(cfg.arkEndpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: botId,
        stream: false,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) {
      const errText = await resp.text();
      let errMsg = 'HTTP ' + resp.status;
      if (resp.status === 401) errMsg += '：API Key 无效，请检查 config.js';
      else if (resp.status === 400) errMsg += '：Bot-ID 无效，请检查 config.js';
      else if (resp.status === 429) errMsg += '：请求太频繁，请稍后重试';
      else errMsg += '：' + (errText.substring(0, 200) || '未知错误');
      resultEl.innerHTML = '<div class="search-status error">❌ ' + errMsg + '</div>';
      return;
    }

    const data = await resp.json();
    const content = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
    const references = data.references || [];

    if (!content) {
      resultEl.innerHTML = '<div class="search-status warning">'
        + '⚠️ AI 未返回结构化数据。可能联网搜索未开启。<br>'
        + '<span style="font-size:11px;color:var(--text-muted);">'
        + '请在火山引擎后台确认 Bot 已开启"联网内容插件"并已发布。</span></div>';
      return;
    }

    // Parse JSON from AI response (robust multi-strategy)
    let schools = [];
    try {
      schools = JSON.parse(content);
    } catch {
      const jsonMatch = content.match(/```(?:json)?\s*\n?([\s\S]*?)```/) || content.match(/\[([\s\S]*)\]/);
      if (jsonMatch) {
        try {
          schools = JSON.parse(jsonMatch[1] || jsonMatch[0]);
        } catch {
          const arrMatch = content.match(/\[[\s\S]*\]/);
          if (arrMatch) {
            try { schools = JSON.parse(arrMatch[0]); } catch { /* fail */ }
          }
        }
      }
    }

    // Fallback: extract from references
    if (schools.length === 0 && references.length > 0) {
      schools = _extractSchoolsFromReferences(references, province);
      if (schools.length > 0) {
        resultEl.innerHTML = '<div class="search-status info">'
          + 'ℹ️ AI 未返回结构化JSON，已从搜索结果摘要中提取 <strong>' + schools.length + '</strong> 所院校。<br>'
          + '<span style="font-size:10px;color:var(--text-muted);">位次/分数可能不完整，建议结合手动搜索确认。</span></div>';
      }
    }

    if (schools.length === 0) {
      resultEl.innerHTML = '<div class="search-status warning">'
        + '⚠️ 未提取到结构化的院校数据。<br>'
        + '<span style="font-size:11px;color:var(--text-muted);">'
        + 'AI 返回内容如下（你可以复制到批量粘贴框手动解析）：<br>'
        + '<textarea readonly style="width:100%;height:80px;margin-top:6px;font-size:11px;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);">'
        + content.substring(0, 2000) + '</textarea></span></div>';
      return;
    }

    // ===== 本地验证 + 重算k值 + 过滤不合理院校 =====
    // 策略：AI按分数段搜索返回原始数据 → 本地验算k值 → 过滤不合理 → 本地分配冲稳保
    const validatedSchools = [];
    const rejectedSchools = [];
    for (const s of schools) {
      const rank24 = parseInt(s.rank) || 0;
      const score24 = parseInt(s.score) || 0;
      const k = rank24 && userRank ? (rank24 / userRank) : 0;

      // 验证1：位次必须在合理范围（k < 0.35 绝对不可能考上，k > 3.0 太低了没参考价值）
      if (k > 0 && (k < 0.35 || k > 3.0)) {
        rejectedSchools.push(s.name + '（位次' + rank24.toLocaleString() + ', k=' + k.toFixed(2) + '，超出合理范围）');
        continue;
      }

      // 验证2：分数必须在可参考范围
      if (score24 > 0 && (score24 < userScore - 50 || score24 > userScore + 40)) {
        rejectedSchools.push(s.name + '（' + score24 + '分，与用户' + userScore + '分差距过大）');
        continue;
      }

      // 本地重算冲稳保（不信任AI的分类）
      let tier = '';
      if (k > 0) {
        if (k < 0.95) tier = '冲';
        else if (k <= 1.08) tier = '稳';
        else tier = '保';
      }

      validatedSchools.push({ ...s, k: k, tier: tier });
    }

    // Log rejected
    if (rejectedSchools.length > 0) {
      console.log('[智能搜索] 过滤了 ' + rejectedSchools.length + ' 所不合理院校：', rejectedSchools);
    }

    // Clear previous working list for fresh search
    _t4Working = [];

    // Convert to _t4Working format
    for (const s of validatedSchools) {
      let notesParts = [];
      if (s.match_reason) notesParts.push('✅ ' + s.match_reason);
      if (s.risk_flag && s.risk_flag.trim()) notesParts.push('⚠️ ' + s.risk_flag);
      if (s.source) notesParts.push('📎 ' + s.source);

      const entry = {
        name: s.name || '',
        city: s.city || '',
        tag: s.tag || '',
        tier: s.tier,
        major_group: s.major_group || '',
        rank24: String(s.rank || ''),
        rank23: '',
        rank22: '',
        score24: String(s.score || ''),
        plan: String(s.plan || ''),
        notes: notesParts.join(' | ')
      };
      _t4Working.push(entry);
    }

    // Sort by tier: 冲 → 稳 → 保, then by k ascending within each tier
    const tierOrder = { '冲': 0, '稳': 1, '保': 2 };
    _t4Working.sort((a, b) => {
      const ta = tierOrder[a.tier] || 9;
      const tb = tierOrder[b.tier] || 9;
      if (ta !== tb) return ta - tb;
      const ka = parseInt(a.rank24) / (userRank || 1);
      const kb = parseInt(b.rank24) / (userRank || 1);
      return ka - kb;
    });

    // Refresh UI
    refreshCandidateEditor();

    // Count tiers
    const tierCounts = { '冲': 0, '稳': 0, '保': 0 };
    _t4Working.forEach(c => {
      if (tierCounts[c.tier] !== undefined) tierCounts[c.tier]++;
    });

    // Show comprehensive success summary
    let summaryHtml = '<div class="search-status success">'
      + '<strong>✅ 画像分析 + 智能搜索完成！</strong><br>'
      + '<span style="font-size:12px;">基于你的T1专业选择、T2个人画像、位次区间，AI 搜索并推荐：</span><br>';

    if (tierCounts['冲'] > 0) summaryHtml += '<span class="tag tag-chong" style="margin:2px;">冲 ' + tierCounts['冲'] + '所</span> ';
    if (tierCounts['稳'] > 0) summaryHtml += '<span class="tag tag-wen" style="margin:2px;">稳 ' + tierCounts['稳'] + '所</span> ';
    if (tierCounts['保'] > 0) summaryHtml += '<span class="tag tag-bao" style="margin:2px;">保 ' + tierCounts['保'] + '所</span> ';

    summaryHtml += '<br><span style="font-size:10px;color:var(--text-muted);">k值区间：冲<' + (K_RANGES.chong.max).toFixed(2) + ' | 稳' + K_RANGES.wen.min.toFixed(2) + '~' + K_RANGES.wen.max.toFixed(2) + ' | 保>' + K_RANGES.wen.max.toFixed(2) + '</span>';
    summaryHtml += '</div>';

    resultEl.innerHTML = summaryHtml;

    // Scroll to candidate list
    setTimeout(() => {
      const sections = document.getElementById('t4ModalBody').querySelectorAll('.search-section');
      const last = sections[sections.length - 1];
      if (last) last.scrollIntoView({ behavior: 'smooth' });
    }, 300);

  } catch (err) {
    const isFetchError = err.message === 'Failed to fetch' || err.name === 'TypeError';
    if (isFetchError) {
      resultEl.innerHTML = '<div class="search-status warning">'
        + '<strong>🌐 无法连接火山引擎</strong><br>'
        + '<span style="font-size:12px;">可能的原因：<br>'
        + '① 网络问题 — 检查是否能访问 ark.cn-beijing.volces.com<br>'
        + '② 如果你在用代理/VPN，可能干扰了国内直连 — 尝试关闭<br>'
        + '③ <code>config.js</code> 中 <code>arkEndpoint</code> 填错了<br><br>'
        + '临时方案：使用下方的 <strong>"📎 手动搜索链接"</strong> 搜完复制回来</span>'
        + '</div>';
    } else {
      resultEl.innerHTML = '<div class="search-status error">'
        + '❌ 搜索失败：' + err.message + '</div>';
    }
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 画像智能搜索';
    _smartSearchActive = false;
  }
}

// ====== Extract schools from Ark Bot search references ======
function _extractSchoolsFromReferences(references, province) {
  const schools = [];
  const seen = new Set();
  for (const ref of references) {
    const title = ref.title || '';
    const snippet = ref.summary || '';
    const combined = title + ' ' + snippet;

    // Match Chinese university names + location + rank patterns
    const uniPattern = /([\u4e00-\u9fa5]{2,10}(?:大学|学院|医科大学|中医药大学|医学院))/g;
    let match;
    while ((match = uniPattern.exec(combined)) !== null) {
      const name = match[1];
      if (seen.has(name)) continue;
      seen.add(name);

      // Try to extract rank from snippet
      const rankMatch = snippet.match(/(?:位次|排名|最低位次)[^\d]*(\d[\d,]*)/) || combined.match(/(\d[\d,]{2,})\s*(?:位次|名|位)/);
      const scoreMatch = snippet.match(/(?:分数|最低分|录取分)[^\d]*(\d{3})/) || combined.match(/(\d{3})\s*(?:分)/);

      schools.push({
        name: name,
        city: '',
        tag: '',
        rank: rankMatch ? parseInt(rankMatch[1].replace(/,/g, '')) : null,
        score: scoreMatch ? parseInt(scoreMatch[1]) : null,
        source: ref.url || ''
      });
    }
  }
  return schools;
}

// ====== Smart Parser ======
function parseSchoolData(text) {
  const results = [];
  const lines = text.split(/[\n\r]+/).filter(l => l.trim());

  for (const line of lines) {
    // Skip meta lines and headers
    if (/院校名称|学校名称|序号|年份|位次|排名|录取|院校代码/.test(line) && !/\d{4,}/.test(line.replace(/[^\d]/g,''))) continue;
    if (line.length < 5) continue;

    // Normalize: replace common separators
    let cleaned = line
      .replace(/[，,、\t]+/g, ' ')
      .replace(/位次|名次|排名/g, '')
      .replace(/分$|分\s/g, '')
      .replace(/\s+/g, ' ')
      .trim();

    // Try to extract rank (4-7 digit number) and score (3 digit number)
    const numbers = cleaned.match(/\d+/g) || [];
    let rank24 = '', score24 = '', rank23 = '', rank22 = '';

    // Find rank numbers (typically 5-6 digits, ≥10000)
    const rankNums = numbers.filter(n => parseInt(n) >= 5000 && parseInt(n) <= 999999);
    // Find score numbers (typically 3 digits, 400-750)
    const scoreNums = numbers.filter(n => parseInt(n) >= 300 && parseInt(n) <= 750);

    if (rankNums.length >= 1) rank24 = rankNums[0];
    if (rankNums.length >= 2) rank23 = rankNums[1];
    if (rankNums.length >= 3) rank22 = rankNums[2];
    if (scoreNums.length >= 1) score24 = scoreNums[0];

    if (!rank24 || !rankNums[0]) continue; // Must have at least one rank

    // Extract name: everything before the first number (the rank)
    let namePart = cleaned;
    const firstNumIdx = cleaned.search(/\d/);
    if (firstNumIdx > 0) namePart = cleaned.substring(0, firstNumIdx).trim();

    // Clean up the name
    let name = namePart.replace(/[\d\s]+$/, '').trim();
    if (name.length < 3) continue;

    // Try to extract city and tag from name
    let city = '';
    let tag = '';

    // Common city patterns
    const cityPatterns = [
      '北京','上海','天津','重庆',
      '广州','深圳','杭州','南京','武汉','成都','西安','长沙','沈阳','青岛','大连',
      '厦门','宁波','苏州','无锡','合肥','郑州','济南','福州','哈尔滨','长春','昆明',
      '南宁','贵阳','南昌','太原','石家庄','兰州','海口','银川','西宁','拉萨','乌鲁木齐',
      '芜湖','蚌埠','马鞍山','安庆','黄山','滁州','阜阳','宿州','六安','亳州','池州','宣城',
      '潍坊','烟台','临沂','济宁','淄博','威海','泰安','日照','聊城','德州','滨州','菏泽','枣庄',
      '锦州','鞍山','抚顺','本溪','丹东','营口','阜新','辽阳','铁岭','朝阳','盘锦','葫芦岛',
      '湘潭','株洲','岳阳','衡阳','常德','郴州','益阳','娄底','邵阳','怀化','永州','张家界','吉首',
      '桂林','柳州','北海','玉林','钦州','百色','河池','梧州',
      '南充','绵阳','泸州','宜宾','德阳','乐山','眉山','内江','自贡','广元','遂宁','达州','攀枝花',
      '新乡','洛阳','开封','南阳','安阳','许昌','焦作','商丘','信阳',
      '徐州','扬州','镇江','南通','常州','泰州','盐城','淮安','连云港','宿迁',
      '温州','绍兴','金华','嘉兴','湖州','台州','丽水','衢州','舟山',
      '唐山','保定','廊坊','邯郸','秦皇岛','张家口','承德','沧州','邢台','衡水',
      '十堰','荆州','宜昌','襄阳','黄石','鄂州','荆门','孝感','黄冈','咸宁',
      '咸阳','宝鸡','延安','汉中','渭南','榆林',
      '佳木斯','齐齐哈尔','牡丹江','大庆',
      '吉林市','四平','延边','通化',
      '遵义','六盘水','安顺',
      '玉溪','曲靖','大理','红河',
      '赣州','九江','景德镇','宜春',
      '泉州','漳州','三明','龙岩',
      '珠海','佛山','东莞','中山','惠州','江门','湛江','茂名','肇庆','梅州','汕头','韶关',
      '三亚',
      '石河子','克拉玛依'
    ];

    // Check if name starts with or contains any city name
    for (const cp of cityPatterns) {
      if (name.includes(cp)) {
        // If the city is NOT the beginning, it's likely the city field
        const idx = name.indexOf(cp);
        if (idx > 2) {
          city = cp;
          // The part before might have tag info
          const before = name.substring(0, idx).trim();
          // Extract potential tag from name
          for (const t of ['985','211','双一流','公办','民办','省重点','部属','省属']) {
            if (before.includes(t) || name.includes(t)) {
              tag = t;
              break;
            }
          }
        }
        break;
      }
    }

    // If no city found in name, name might just be the school name
    if (!city) {
      // Try to find tag in the cleaned line
      for (const t of ['985','211','双一流','公办','民办','省重点']) {
        if (cleaned.includes(t)) {
          tag = t;
          break;
        }
      }
    }

    results.push({
      name: name.replace(/[·•\-—\s]+$/, '').trim(),
      city: city,
      tag: tag,
      rank24: rank24,
      rank23: rank23,
      rank22: rank22,
      score24: score24,
      plan: '',
      notes: ''
    });
  }

  return results;
}

  _t4Working.push({ name, city, tag, rank24, rank23, rank22, score24, plan, notes });

  // Clear form
  ['t4mName','t4mCity','t4mRank24','t4mScore24','t4mRank23','t4mRank22','t4mPlan','t4mNotes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('t4mTag').value = '';

  refreshCandidateEditor();
}

function deleteT4Candidate(idx) {
  _t4Working.splice(idx, 1);
  refreshCandidateEditor();
}

function renderCandidateEditorInner() {
  const userRank = parseInt(appData.rank || '1');

  let html = '<table class="candidate-edit-table"><thead><tr>'
    + '<th>#</th><th>院校名称</th><th>城市</th><th>层次</th>'
    + '<th>' + getDataYear() + '专业组位次</th><th>' + getDataYear() + '分</th><th>k值</th><th>分类</th>'
    + '<th>AI匹配说明</th><th>操作</th>'
    + '</tr></thead><tbody>';

  _t4Working.forEach((c, i) => {
    const rank24 = parseInt(c.rank24) || 0;
    const k = rank24 && userRank ? (rank24 / userRank) : 0;
    let kDisplay = '—', kClass = '', ckwb = '—', ckwbClass = '';

    if (k > 0) {
      kDisplay = k.toFixed(2);
      if (k < 0.95) { ckwb = '冲'; kClass = 'chong'; ckwbClass = 'chong'; }
      else if (k <= 1.08) { ckwb = '稳'; kClass = 'wen'; ckwbClass = 'wen'; }
      else { ckwb = '保'; kClass = 'bao'; ckwbClass = 'bao'; }
    } else if (c.tier) {
      // Use AI-assigned tier if k not available
      ckwb = c.tier;
      ckwbClass = c.tier === '冲' ? 'chong' : c.tier === '稳' ? 'wen' : 'bao';
    }

    // Parse notes: split by | to separate match_reason and risk_flag
    const notesParts = (c.notes || '').split('|').map(s => s.trim()).filter(Boolean);
    let notesHtml = '';
    notesParts.forEach(part => {
      if (part.startsWith('✅')) notesHtml += '<span style="color:#10b981;font-size:10px;">' + escapeHtml(part) + '</span><br>';
      else if (part.startsWith('⚠️')) notesHtml += '<span style="color:#f59e0b;font-size:10px;">' + escapeHtml(part) + '</span><br>';
      else if (part.startsWith('📎')) notesHtml += '<span style="color:var(--text-muted);font-size:9px;">' + escapeHtml(part) + '</span><br>';
      else notesHtml += '<span style="font-size:10px;">' + escapeHtml(part) + '</span><br>';
    });

    html += '<tr>'
      + '<td>' + (i+1) + '</td>'
      + '<td><strong>' + escapeHtml(c.name) + '</strong></td>'
      + '<td>' + escapeHtml(c.city) + '</td>'
      + '<td>' + escapeHtml(c.tag) + '</td>'
      + '<td>' + escapeHtml(c.rank24) + '</td>'
      + '<td>' + escapeHtml(c.score24) + '</td>'
      + '<td><span class="k-badge ' + kClass + '">k=' + kDisplay + '</span></td>'
      + '<td><span class="k-badge ' + ckwbClass + '">' + ckwb + '</span></td>'
      + '<td style="max-width:200px;">' + (notesHtml || '<span style="color:var(--text-muted);font-size:10px;">—</span>') + '</td>'
      + '<td><button class="btn-danger-sm" onclick="deleteT4Candidate(' + i + ')">✕</button></td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  return html;
}

function refreshCandidateEditor() {
  // Find the candidate editor section and refresh it
  const body = document.getElementById('t4ModalBody');
  const sections = body.querySelectorAll('.search-section');
  // Find the last section (current candidate list) and update it
  const lastSection = sections[sections.length - 1];
  if (lastSection) {
    if (_t4Working.length > 0) {
      lastSection.innerHTML = '<h3>📊 当前候选列表（' + _t4Working.length + ' 所）</h3>' + renderCandidateEditorInner();
    } else {
      lastSection.innerHTML = '<h3>📊 当前候选列表（0 所）</h3>'
        + '<div style="text-align:center;padding:24px;color:var(--text-muted);">'
        + '还没有添加任何院校。</div>';
    }
  }

  // Also update summary if exists
  const summaryDiv = body.querySelector('.candidate-summary');
  if (summaryDiv) {
    if (_t4Working.length > 0) {
      const tierCounts = { '冲': 0, '稳': 0, '保': 0 };
      _t4Working.forEach(c => { if (tierCounts[c.tier] !== undefined) tierCounts[c.tier]++; });
      summaryDiv.innerHTML = '已录入 <strong>' + _t4Working.length + '</strong> 所院校 '
        + (tierCounts['冲'] > 0 ? '<span class="tag tag-chong" style="margin:0 2px;">冲' + tierCounts['冲'] + '</span>' : '')
        + (tierCounts['稳'] > 0 ? '<span class="tag tag-wen" style="margin:0 2px;">稳' + tierCounts['稳'] + '</span>' : '')
        + (tierCounts['保'] > 0 ? '<span class="tag tag-bao" style="margin:0 2px;">保' + tierCounts['保'] + '</span>' : '')
        + '<br>点击右下角 <strong>"✅ 生成候选草表"</strong> 将自动计算k值并分类冲稳保。<br>'
        + '<span style="color:var(--text-muted);font-size:11px;">提示：至少录入 6 所以上才能做冲稳保配比。</span>';
    } else {
      summaryDiv.remove();
    }
  }
}

// ====== Finalize: Process T4 working list → appData.candidates ======
function finalizeCandidates() {
  if (_t4Working.length === 0) {
    alert('请至少添加1所院校数据。');
    return;
  }

  const userRank = parseInt(appData.rank || '1');

  // Convert working list to standard candidate format
  // 先获取用户拒绝的专业列表（用于干净度检查）
  const rejectedMajors = getRejectedMajors(appData.t1Data);

  appData.candidates = _t4Working.map(c => {
    const rank24 = parseInt(c.rank24) || 0;
    const k = rank24 && userRank ? (rank24 / userRank) : 0;

    let tag_ckwb = c.tier || '—';
    if (k > 0) {
      if (k < 0.95) tag_ckwb = '冲';
      else if (k <= 1.08) tag_ckwb = '稳';
      else tag_ckwb = '保';
    }

    const rankYear = getDataYear() + '：' + (c.rank24 ? parseInt(c.rank24).toLocaleString() + '位次' : '—')
      + (c.score24 ? ' / ' + c.score24 + '分' : '');

    // 专业组干净度检查
    const cleanliness = checkGroupCleanliness(c.name, rejectedMajors);

    return {
      name: c.name,
      code: '待核验[考试院]',
      city: c.city,
      tag: c.tag || '',
      major_group: c.major_group || '',
      k: k > 0 ? k.toFixed(2) : '—',
      tag_ckwb: tag_ckwb,
      rankYear: rankYear,
      scoreYear: c.score24 || '',
      plan: c.plan || '待核验',
      notes: c.notes || '',
      _rankYear: c.rank24,
      _scoreYear: c.score24,
      _cleanliness: cleanliness // 干净度检查结果
    };
  });

  // Sort by k value ascending (冲在前)
  appData.candidates.sort((a, b) => parseFloat(a.k) - parseFloat(b.k));

  saveData(appData);
  setStage(4, 1);
  closeModal('t4Modal');

  const total = appData.candidates.length;
  let msg = '✅ 候选草表已生成。<br>';
  msg += '共录入 <strong>' + total + '</strong> 所院校。<br><br>';

  // Count categories
  const groups = { '冲':[], '稳':[], '保':[] };
  appData.candidates.forEach(c => { if (groups[c.tag_ckwb]) groups[c.tag_ckwb].push(c); });
  msg += '<strong>📐 k值算法：k = 专业组位次(R_major) / 你的位次(R_user)</strong>（R_user ≈ ' + userRank + '）<br>';
  for (const [l, list] of Object.entries(groups)) {
    if (list.length > 0) {
      msg += '<span class="tag tag-' + (l==='冲'?'chong':l==='稳'?'wen':'bao') + '">' + l + '（' + list.length + '所）</span> ';
    }
  }

  // 冲稳保配比检查（理想 3:4:3）
  var chongN = groups['冲'].length, wenN = groups['稳'].length, baoN = groups['保'].length;
  if (total >= 6) {
    var idealChong = Math.round(total * 0.3), idealWen = Math.round(total * 0.4), idealBao = Math.round(total * 0.3);
    var ratioIssues = [];
    if (chongN === 0) ratioIssues.push('缺少<strong>冲</strong>档院校（建议' + idealChong + '所）');
    else if (chongN < idealChong - 1) ratioIssues.push('<strong>冲</strong>档偏少（' + chongN + '所，建议' + idealChong + '所）');
    if (wenN === 0) ratioIssues.push('缺少<strong>稳</strong>档院校（建议' + idealWen + '所）');
    else if (wenN < idealWen - 1) ratioIssues.push('<strong>稳</strong>档偏少（' + wenN + '所，建议' + idealWen + '所）');
    if (baoN === 0) ratioIssues.push('缺少<strong>保</strong>档院校（建议' + idealBao + '所）');
    else if (baoN < idealBao - 1) ratioIssues.push('<strong>保</strong>档偏少（' + baoN + '所，建议' + idealBao + '所）');
    if (ratioIssues.length > 0) {
      msg += '<br><br><div style="padding:10px 14px;background:rgba(245,158,11,0.1);border:1px solid var(--warning);border-radius:8px;font-size:12px;">';
      msg += '<strong>⚠️ 配比提醒</strong>（理想 3:4:3）：' + ratioIssues.join('；') + '<br>';
      msg += '<span style="color:var(--text-muted)">建议返回补充对应档位院校，避免全冲滑档或全保浪费分数。</span>';
      msg += '</div>';
    }
  }

  // 候选数补足检查：候选数 ≥ 本省可填志愿数 × 1.5
  const province = appData.province || '';
  const slots = PROVINCE_SLOTS[province] || PROVINCE_SLOTS_DEFAULT;
  const minNeeded = Math.ceil(slots * 1.5);
  if (total < minNeeded) {
    msg += '<br><br><div style="padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid var(--danger);border-radius:8px;font-size:12px;">';
    msg += '<strong>🚨 候选数不足：</strong>' + province + '新高考可填 <strong>' + slots + '</strong> 个志愿，建议至少准备 <strong>' + minNeeded + '</strong> 个候选（可填数 × 1.5）。<br>';
    msg += '当前仅 <strong>' + total + '</strong> 个候选，缺口 <strong>' + (minNeeded - total) + '</strong> 个。<br>';
    msg += '<span style="color:var(--text-muted)">建议：放宽城市/专业限制 → 返回阶段4通过AI画像搜索补充 → 或在T4手动添加更多院校。</span>';
    msg += '</div>';
  }

  // 专业组干净度汇总
  const dirtyCount = appData.candidates.filter(c => c._cleanliness && !c._cleanliness.clean).length;
  if (dirtyCount > 0) {
    msg += '<br><div style="padding:10px 14px;background:rgba(245,158,11,0.1);border:1px solid var(--warning);border-radius:8px;font-size:12px;">';
    msg += '<strong>⚠️ 专业组干净度提醒：</strong><strong>' + dirtyCount + '</strong> 个候选院校与你拒绝的专业方向存在重叠风险。<br>';
    msg += '查看草表时注意「服从调剂」建议——如果该组包含你拒绝的专业，服从调剂可能导致被分配到不想要的领域。<br>';
    msg += '<span style="color:var(--text-muted)">建议：对高危院校考虑"不服从调剂"（有退档风险），或用同层次其他院校替代。</span>';
    msg += '</div>';
  }

  addAIMessage(msg, [
    {text:'📊 查看完整候选草表', primary:true},
    {text:'📄 生成最终报告'}
  ]);
  window._quickReplyHandler = (idx) => {
    if (idx === 0) openT3Modal();
    else { setStage(5, 0); runStage5(0); }
  };
  window._messageHandler = (text) => {
    if (text.includes('草表') || text.includes('查看')) openT3Modal();
    else { setStage(5, 0); runStage5(0); }
  };
}

// T1 batch operations
function batchSetT1(val) {
  appData.t1Data.forEach(r => { r.consider = val; });
  closeModal('t1Modal'); // close and reopen to refresh UI
  setTimeout(() => openT1Modal(), 50);
}
function catSetT1(catName, val) {
  appData.t1Data.forEach(r => {
    if (r.cat.replace(/^\d+\s*/, '') === catName) r.consider = val;
  });
  closeModal('t1Modal');
  setTimeout(() => openT1Modal(), 50);
}
function cycleT1(idx) {
  const cycle = { '':'是', '是':'否', '否':'待定', '待定':'' };
  appData.t1Data[idx].consider = cycle[appData.t1Data[idx].consider] || '';
  // Just update button inline without full re-render
  const btn = document.getElementById('t1t_'+idx);
  const v = appData.t1Data[idx].consider;
  if (btn) {
    btn.textContent = v || '—';
    btn.className = 't1-toggle ' + (v==='是'?'t1-btn-yes':v==='否'?'t1-btn-no':v==='待定'?'t1-btn-maybe':'');
  }
  // Update the category header badge
  updateT1CatBadges();
}
function toggleT1Cat(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('.cat-arrow');
  if (body) {
    body.style.display = body.style.display === 'none' ? '' : 'none';
    if (arrow) arrow.style.transform = body.style.display === 'none' ? 'rotate(-90deg)' : '';
  }
}
function updateT1CatBadges() {
  // Simple approach: just update badges array for next open
  // Inline badge updates are handled via the close/reopen cycle
}

function updateT1Field(idx, field, value) {
  appData.t1Data[idx][field] = value;
  // Don't save on every keystroke — save only on modal close
}

function filterT1Rows(query) {
  query = (query || '').trim().toLowerCase();
  const body = document.getElementById('t1ModalBody');
  const catHeaders = body.querySelectorAll('.t1-cat-header');
  const catBodies = body.querySelectorAll('.t1-cat-body');
  catHeaders.forEach((header, i) => {
    const catBody = catBodies[i];
    if (!catBody) return;
    const rows = catBody.querySelectorAll('tbody tr');
    let visibleCount = 0;
    rows.forEach(row => {
      const text = row.textContent.toLowerCase();
      const match = !query || text.includes(query);
      row.style.display = match ? '' : 'none';
      if (match) visibleCount++;
    });
    // Hide category header if no matching rows
    header.style.display = visibleCount > 0 ? '' : 'none';
    if (query && visibleCount > 0) {
      // Auto-expand when searching
      catBody.style.display = '';
      const arrow = header.querySelector('.cat-arrow');
      if (arrow) arrow.style.transform = '';
    }
  });
}

function saveT1AndClose() {
  saveData(appData);
  closeModal('t1Modal');
  const yesCount = appData.t1Data.filter(r=>r.consider==='是').length;
  addAIMessage('📋 T1表已保存。标记了 <strong>' + yesCount + '</strong> 个「是」的专业类。');

  // Always advance to step 1 and run validation
  if (appData.stage === 2) {

    setTimeout(() => runStage2_validation(), 1000);

}

function toggleT2Group(headerEl) {
  const body = headerEl.nextElementSibling;
  const arrow = headerEl.querySelector('.collapse-arrow');
  if (!body) return;
  const isCollapsed = body.classList.contains('collapsed');
  if (isCollapsed) {
    body.classList.remove('collapsed');
    body.style.maxHeight = '';
    if (arrow) { arrow.style.transform = ''; headerEl.classList.remove('collapsed'); }
  } else {
    body.classList.add('collapsed');
    body.style.maxHeight = '0';
    if (arrow) { arrow.style.transform = 'rotate(-90deg)'; headerEl.classList.add('collapsed'); }
  }
}

function saveT2AndClose() {

  const inputs = document.querySelectorAll('#t2ModalBody input[type="text"]');

    if (!isNaN(idx) && idx >= 0 && idx < appData.t2Data.length) {
      appData.t2Data[idx].prefilledValue = inp.value;

  saveData(appData);
  closeModal('t2Modal');

  const gs = {};
  appData.t2Data.forEach(item => {

  if (appData.stage === 2) {
    setStage(2, 1);
    setTimeout(() => runStage2_validation(), 1000);
  }
}

      var cleanliness = c._cleanliness || checkGroupCleanliness(c.name, getRejectedMajors(appData.t1Data));
      var isDirty = cleanliness && !cleanliness.clean;
      var dirtyRisks = isDirty ? cleanliness.risks : [];

      if (isDirty && dirtyRisks.length > 0) {
        // 有干净度风险 → 警告服从调剂可能导致进入拒绝专业
        adjustAdvice = '<span style="color:var(--danger);font-weight:bold;">⚠️ 谨慎服从</span><br>';
        adjustAdvice += '<small style="color:var(--warning)">' + dirtyRisks[0].reason + '</small><br>';
        adjustAdvice += '<small style="color:var(--text-muted)">不服从→退档风险 | 服从→可能被调剂到不想要的专业</small>';
      } else if (c.tag_ckwb === '冲' || c.tag_ckwb === '太冲') {
        adjustAdvice = '<span style="color:var(--danger)">🔴 强烈建议服从</span><br><small style="color:var(--text-muted)">冲档风险大，服从可避免退档</small>';
      } else if (c.tag_ckwb === '稳') {
        adjustAdvice = '<span style="color:var(--warning)">🟡 建议服从</span><br><small style="color:var(--text-muted)">稳档分数接近，服从保底</small>';
      } else if (c.tag_ckwb === '保') {
        if (kVal > 1.3) {
          adjustAdvice = '<span style="color:var(--text-secondary)">⚪ 可选服从</span><br><small style="color:var(--text-muted)">保档分差大，视专业意愿定</small>';
        } else {
          adjustAdvice = '<span style="color:var(--success)">🟢 建议服从</span><br><small style="color:var(--text-muted)">保档稳妥，服从无风险</small>';
        }
      } else {
        adjustAdvice = '<span style="color:var(--text-muted)">待评估</span>';
      }
      html += `<td style="font-size:11px">${adjustAdvice}</td>`;
      // 匹配说明：先显示AI匹配原因，再追加干净度风险
      var notesClean = escapeHtml(c.notes||'');
      if (isDirty && dirtyRisks.length > 0) {
        notesClean += (notesClean ? '<br>' : '') + '<span style="color:var(--warning);font-weight:bold;">⚠️ 组干净度风险：</span>' + dirtyRisks.map(r => r.reason).join('；');
      }
      html += `<td style="font-size:11px">${notesClean}</td>`;
      html += '</tr>';
    });
  }

  html += '</tbody></table></div></div>';

  // Source & timeline declaration
  html += `<div style="margin-top:20px;padding:16px;background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:8px;">`;
  html += `<h3 style="font-size:14px;margin-bottom:12px;color:var(--accent);">📎 来源与时效声明（逐条全量列出）</h3>`;
  html += `<div style="font-size:12px;line-height:1.8;color:var(--text-secondary);">`;

  // One-point-one-segment table (对齐 SKILL.md URL三件套格式)
  const todayISO = new Date().toISOString().split('T')[0];
  const dataYear = getDataYear();
  html += `<strong>一分一段表：</strong><br>`;
  html += `· 用户位次 · 采集年份：${dataYear} · 采集于 ${todayISO}`
    + (authority ? ` · [${authority.name}](${authority.url})` : '') + '<br><br>';

  html += `<strong>院校名单：</strong><br>`;
  html += `· [阳光高考院校信息库](https://gaokao.chsi.com.cn/sch/) · 采集年份：${dataYear} · 采集于 ${todayISO}<br>`;
  html += `· [掌上高考](https://www.gaokao.cn/) · 采集年份：${dataYear} · 采集于 ${todayISO}<br>`;
  html += `· [高考100](https://www.gk100.com/) · 采集年份：${dataYear} · 采集于 ${todayISO}<br><br>`;

  html += `<strong>专业组录取位次/分数（逐校列出）：</strong><br>`;
  appData.candidates.forEach(c => {
    html += `· ${c.name} · 采集年份：${dataYear} · 采集于 ${todayISO} · 来源：掌上高考/高考100<br>`;
  });
  html += '<br>';

  html += `<strong>招生计划：</strong><br>`;
  html += `· 待核验 · 采集年份：${dataYear} · 采集于 ${todayISO}`
    + (authority ? ` · [${authority.name}](${authority.url})` : '') + '<br><br>';

  html += `<strong>选科要求：</strong><br>`;
  html += `· ${appData.examType || '待确认'} · 采集年份：${dataYear} · 采集于 ${todayISO}`
    + (authority ? ` · [${authority.name}](${authority.url})` : '') + '<br><br>';

  html += `<strong>专业信息：</strong><br>`;
  html += `· [阳光高考专业知识库](https://gaokao.chsi.com.cn/zyk/) · 采集年份：${dataYear} · 采集于 ${todayISO}<br><br>`;

  html += `<strong>主观参考：</strong><br>`;
  html += `· [colleges.chat](https://colleges.chat/) · 采集年份：${dataYear} · 采集于 ${todayISO} · 仅供参考，建议交叉验证<br><br>`;

  html += `<strong>志愿填报规则：</strong><br>`;
  html += `· ${authority ? `[${authority.name}](${authority.url})` : '省考试院'} · 采集年份：${dataYear} · 采集于 ${todayISO}<br>`;

  html += `</div>`;

  // Final legal
  html += `<div style="margin-top:12px;padding:12px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:8px;font-size:12px;color:var(--text-secondary);">`;
  html += `<strong>⚠️ 法务定稿：</strong>本报告内容均由 AI 辅助生成，仅供参考，不构成任何填报、录取或决策的承诺与建议。最终决定请您和家人结合官方信息综合判断。`;
  html += `</div>`;

  html += `</div>`; // Close source block

  body.innerHTML = html;
  document.getElementById('t3Modal').style.display = 'flex';
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// 服从调剂建议（纯文本版，用于CSV导出）
function getAdjustAdvice(tag, kVal) {
  if (tag === '冲' || tag === '太冲') return '强烈建议服从（冲档风险大，服从可避免退档）';
  if (tag === '稳') return '建议服从（稳档分数接近，服从保底）';
  if (tag === '保') return kVal > 1.3 ? '可选服从（保档分差大，视专业意愿定）' : '建议服从（保档稳妥，服从无风险）';
  return '待评估';
}

function exportXLSX() {
  try {
    if (typeof XLSX === 'undefined') {
      showToast('⚠️ SheetJS 库未加载，请刷新页面', 'warning');
      return;
    }

    const rawList = (typeof _t4Working !== "undefined" && _t4Working.length > 0) ? _t4Working : (appData.candidates || []);
    if (!rawList || rawList.length === 0) {
      showToast('⚠️ 当前没有可导出的志愿数据', 'warning');
      return;
    }

    const userRank = parseInt(appData.rank || '0');
    const userMajors = (appData.t1Data || []).filter(r => r.consider === '是').map(r => r.major.replace(/^\d+\s*/, '')).join('、') || '待定';
    const generateTime = new Date().toLocaleString('zh-CN');
    const dataCutoff = getDataYear() + '年录取数据（辅以' + (getDataYear()-1) + '/' + (getDataYear()-2) + '年）';
    const province = appData.province || '';
    const authority = PROVINCE_AUTHORITY[province];
    const today = new Date().toISOString().split('T')[0];
    const authName = authority ? authority.name : '各省教育考试院';

    // ===== 统一标准化数据（与 T3 HTML 渲染完全一致） =====
    // 无论来源是 _t4Working（原始格式）还是 appData.candidates（已转换格式），
    // 统一输出标准化字段：k, tag_ckwb, rankYear, major_group, plan, notes, _cleanliness
    const rejectedMajors = getRejectedMajors(appData.t1Data);
    const list = rawList.map(c => {
      // 如果已经是标准化格式（有 tag_ckwb 字段），直接使用
      if (c.tag_ckwb !== undefined) {
        // 补充可能缺失的 _cleanliness
        if (!c._cleanliness) {
          c._cleanliness = checkGroupCleanliness(c.name, rejectedMajors);
        }
        return c;
      }
      // 否则是 _t4Working 原始格式，需要计算
      const rank24 = parseInt(c.rank24) || 0;
      const k = rank24 && userRank ? (rank24 / userRank) : 0;
      let tag_ckwb = c.tier || '—';
      if (k > 0) {
        if (k < 0.95) tag_ckwb = '冲';
        else if (k <= 1.08) tag_ckwb = '稳';
        else tag_ckwb = '保';
      }
      const rankYear = getDataYear() + '：' + (c.rank24 ? parseInt(c.rank24).toLocaleString() + '位次' : '—')
        + (c.score24 ? ' / ' + c.score24 + '分' : '');
      const cleanliness = checkGroupCleanliness(c.name, rejectedMajors);
      return {
        name: c.name,
        code: c.code || '待核验[考试院]',
        city: c.city,
        tag: c.tag || '',
        major_group: c.major_group || '',
        k: k > 0 ? k.toFixed(2) : '—',
        tag_ckwb: tag_ckwb,
        rankYear: rankYear,
        scoreYear: c.score24 || '',
        plan: c.plan || '待核验',
        notes: c.notes || '',
        _cleanliness: cleanliness
      };
    });

    // 按k值排序（冲在前），与 finalizeCandidates() 一致
    list.sort((a, b) => parseFloat(a.k) - parseFloat(b.k));

    // ===== 样式定义 =====
    // 颜色常量 (SheetJS 用 FF 前缀的 AARRGGBB)
    const YELLOW_BG    = 'FFFEF3C7';   // 声明行背景
    const AMBER_TEXT   = 'FF92400E';   // 声明文字
    const NAVY_BG      = 'FF1E3A5F';   // 表头背景
    const WHITE_TEXT    = 'FFFFFFFF';   // 表头白字
    const BORDER_COLOR  = 'FFD1D5DB';  // 边界线色
    const CHONG_BG      = 'FFFEF2F2';   // 冲 (淡红)
    const WEN_BG        = 'FFEFF6FF';   // 稳 (淡蓝)
    const BAO_BG        = 'FFF0FDF4';   // 保 (淡绿)
    const GREY_BG       = 'FFF9FAFB';   // 默认灰底
    const GREY_TEXT     = 'FF6B7280';   // 灰色文字

    // 工具：创建样式
    function style(fontOpt, fillOpt, alignOpt, borderOpt) {
      const s = { font: {}, fill: {}, alignment: {} };
      if (fontOpt) {
        if (fontOpt.bold) s.font.bold = true;
        if (fontOpt.color) s.font.color = { rgb: fontOpt.color };
        if (fontOpt.sz) s.font.sz = fontOpt.sz;
        if (fontOpt.name) s.font.name = fontOpt.name;
      }
      if (fillOpt) {
        s.fill = { fgColor: { rgb: fillOpt.color }, patternType: 'solid' };
      }
      if (alignOpt) {
        if (alignOpt.h) s.alignment.horizontal = alignOpt.h;
        if (alignOpt.v) s.alignment.vertical = alignOpt.v;
        if (alignOpt.wrap) s.alignment.wrapText = true;
      }
      if (borderOpt) {
        const bStyle = borderOpt.style || 'thin';
        s.border = {};
        ['top', 'bottom', 'left', 'right'].forEach(side => {
          s.border[side] = { style: bStyle, color: { rgb: borderOpt.color || BORDER_COLOR } };
        });
      }
      return s;
    }

    // 声明行样式（黄底·深琥珀文字·加粗·居中）
    const STYLE_HEADER_ROW = style(
      { bold: true, color: AMBER_TEXT, sz: 11, name: '微软雅黑' },
      { color: YELLOW_BG },
      { h: 'left', v: 'center', wrap: true },
      { color: 'FFD97706', style: 'medium' }
    );

    // 表头样式（海军蓝底·白字加粗·居中）
    const STYLE_COL_HEADER = style(
      { bold: true, color: WHITE_TEXT, sz: 11, name: '微软雅黑' },
      { color: NAVY_BG },
      { h: 'center', v: 'center', wrap: true },
      { color: NAVY_BG, style: 'thin' }
    );

    // 数据行普通边框
    const BORDER_THIN = { color: BORDER_COLOR, style: 'thin' };

    // 数据行样式 - 按冲稳保着色
    function getDataStyle(tag) {
      let bg = GREY_BG;
      if (tag === '冲' || tag === '太冲') bg = CHONG_BG;
      else if (tag === '稳') bg = WEN_BG;
      else if (tag === '保') bg = BAO_BG;

      return style(
        { bold: false, color: 'FF111827', sz: 10.5, name: '微软雅黑' },
        { color: bg },
        { h: 'left', v: 'center', wrap: true },
        BORDER_THIN
      );
    }

    // 尾部来源行样式（灰底·灰色字·居中）
    const STYLE_FOOTER = style(
      { bold: false, color: GREY_TEXT, sz: 9.5, name: '微软雅黑' },
      { color: 'FFF9FAFB' },
      { h: 'left', v: 'center', wrap: true },
      { color: BORDER_COLOR, style: 'hair' }
    );

    // 尾部标题样式（加粗）
    const STYLE_FOOTER_TITLE = style(
      { bold: true, color: 'FF374151', sz: 10, name: '微软雅黑' },
      null,
      { h: 'left', v: 'center', wrap: true },
      { color: BORDER_COLOR, style: 'hair' }
    );

    // 法务定稿样式（警示感）
    const STYLE_LEGAL = style(
      { bold: true, color: 'FFDC2626', sz: 10, name: '微软雅黑' },
      { color: 'FFFEF2F2' },
      { h: 'left', v: 'center', wrap: true },
      { color: 'FFFCA5A5', style: 'thin' }
    );

    // 元信息行样式（浅黄底·加粗）
    const STYLE_META = style(
      { bold: true, color: 'FF92400E', sz: 10.5, name: '微软雅黑' },
      { color: YELLOW_BG },
      { h: 'left', v: 'center', wrap: true },
      { color: 'FFD97706', style: 'medium' }
    );

    // ========== 13列表头 ==========
    const headers = [
      '序号', '冲·稳·保', '院校名称', '院校代码(待核验)',
      '专业组·专业', '专业组代码·专业代码(待核验)', '城市', '院校标签',
      '选科匹配', '专业组录取位次·分数', '招生计划数', '建议服从调剂', '匹配说明·备注'
    ];

    // ========== 数据行（与 T3 HTML 渲染逻辑完全一致） ==========
    const dataRows = list.map((c, i) => {
      const kv = parseFloat(c.k) || 0;
      const cleanliness = c._cleanliness || checkGroupCleanliness(c.name, rejectedMajors);
      const isDirty = cleanliness && !cleanliness.clean;
      const dirtyRisks = isDirty ? cleanliness.risks : [];

      // 建议服从调剂（与 T3 HTML 完全一致）
      let advice = '';
      if (isDirty && dirtyRisks.length > 0) {
        advice = '⚠️ 谨慎服从 — ' + dirtyRisks[0].reason + '（不服从→退档风险 | 服从→可能被调剂到不想要的专业）';
      } else if (c.tag_ckwb === '冲' || c.tag_ckwb === '太冲') {
        advice = '🔴 强烈建议服从（冲档风险大，服从可避免退档）';
      } else if (c.tag_ckwb === '稳') {
        advice = '🟡 建议服从（稳档分数接近，服从保底）';
      } else if (c.tag_ckwb === '保') {
        advice = kv > 1.3 ? '⚪ 可选服从（保档分差大，视专业意愿定）' : '🟢 建议服从（保档稳妥，服从无风险）';
      } else {
        advice = '待评估';
      }

      // 匹配说明·备注（追加干净度风险，与 T3 HTML 一致）
      let notesFull = c.notes || '';
      if (isDirty && dirtyRisks.length > 0) {
        const riskText = dirtyRisks.map(r => r.reason).join('；');
        notesFull += (notesFull ? ' | ' : '') + '⚠️ 组干净度风险：' + riskText;
      }

      return [
        i + 1,
        (c.tag_ckwb || '—') + ' (k≈' + (c.k || '—') + ')',
        c.name || '',
        c.code || '待核验[考试院]',
        c.major_group || userMajors,
        '待核验[考试院]',
        c.city || '',
        c.tag || '',
        appData.examType || '待确认',
        c.rankYear || '',
        c.plan || '待核验',
        advice,
        notesFull
      ];
    });

    // ========== 来源与时效声明（尾部行，对齐 SKILL.md 三件套格式） ==========
    const footerRows = [
      [''],
      ['📎 来源与时效声明（逐条全量列出）'],
      ['一分一段表 · 采集年份：' + getDataYear() + ' · 采集于 ' + today + (authName ? ' · [' + authName + '](' + (authority ? authority.url : '') + ')' : '')],
      ['[阳光高考院校信息库](https://gaokao.chsi.com.cn/sch/) · 采集年份：' + getDataYear() + ' · 采集于 ' + today],
      ['[掌上高考](https://www.gaokao.cn/) · 采集年份：' + getDataYear() + ' · 采集于 ' + today],
      ['[高考100](https://www.gk100.com/) · 采集年份：' + getDataYear() + ' · 采集于 ' + today],
    ];

    footerRows.push(['专业组录取位次/分数（逐校列出）：']);
    list.forEach(c => {
      footerRows.push(['· ' + c.name + ' · ' + (c.rankYear || '位次待核验') + ' · 采集年份：' + getDataYear() + ' · 采集于 ' + today + ' · 参考来源：掌上高考/高考100']);
    });

    footerRows.push(
      ['招生计划 · 待核验 · 采集年份：' + getDataYear() + ' · 采集于 ' + today + (authName ? ' · ' + authName : '')],
      ['选科要求 · ' + (appData.examType || '待确认') + ' · 采集年份：' + getDataYear() + ' · 采集于 ' + today + (authName ? ' · ' + authName : '')],
      ['[阳光高考专业知识库](https://gaokao.chsi.com.cn/zyk/) · 采集年份：' + getDataYear() + ' · 采集于 ' + today],
      ['[colleges.chat](https://colleges.chat/) · 采集年份：' + getDataYear() + ' · 采集于 ' + today + ' · 仅供参考，建议交叉验证'],
      [(authName ? authName : '省考试院') + ' · 采集年份：' + getDataYear() + ' · 采集于 ' + today],
      [''],
      ['⚠️ 法务定稿：本报告内容均由 AI 辅助生成，仅供参考，不构成任何填报、录取或决策的承诺与建议。最终决定请您和家人结合官方信息综合判断。']
    );

    // ========== 组装 Sheet ==========
    const allRows = [
      // Row 0: 声明D（对齐 SKILL.md 法务定稿）
      ['【表头声明】 本表由 AI 辅助生成，所有院校/专业/代码均"待核验"，请以' + authName + '当年官方招生计划为准；录取规则以学校招生简章为准。最终决定请您和家人结合官方信息综合判断。'],
      // Row 1: 元信息
      ['📅 生成时间：' + generateTime + ' | 📊 数据截至：' + dataCutoff + ' | 📍 适用省份：' + province + ' | 📐 k = 专业组录取位次(R_major) ÷ 你的位次(R_user)'],
      // Row 2: K值解释
      ['📐 K值说明：k = R_major / R_user（必须用专业组/专业位次，不可用院校整体最低位次！）。冲：k<0.95（专业组位次比你高5%以上）；稳：0.95≤k≤1.08；保：k>1.08。建议按 3:4:3（冲:稳:保）配比填报。'],
      // Row 3: 表头
      headers,
      // Rows 4~N: 数据
      ...dataRows,
      // 尾部声明
      ...footerRows
    ];

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(allRows);

    const colCount = 13;
    const dataEndRow = 3 + dataRows.length; // 数据结束后第一行
    const footerStartRow = dataEndRow;
    const lastRow = allRows.length - 1;

    // ========== 列宽优化 ==========
    ws['!cols'] = [
      { wch: 5 },   // 序号
      { wch: 15 },  // 冲稳保 (k值会拉伸)
      { wch: 26 },  // 院校名称 ← 加宽
      { wch: 16 },  // 院校代码
      { wch: 24 },  // 专业组·专业
      { wch: 24 },  // 专业组代码
      { wch: 13 },  // 城市
      { wch: 18 },  // 院校标签
      { wch: 12 },  // 选科匹配
      { wch: 24 },  // 近年录取位次·分数
      { wch: 12 },  // 招生计划数
      { wch: 36 },  // 建议服从调剂 ← 加宽
      { wch: 32 }   // 匹配说明·备注
    ];

    // ========== 行高 ==========
    ws['!rows'] = [];
    ws['!rows'][0] = { hpx: 42 };  // 声明行
    ws['!rows'][1] = { hpx: 36 };  // 元信息
    ws['!rows'][2] = { hpx: 48 };  // K值说明（文字多，加高）
    ws['!rows'][3] = { hpx: 36 };  // 表头
    // 数据行
    for (let i = 4; i <= dataEndRow; i++) {
      ws['!rows'][i] = { hpx: 28 };
    }
    // 尾部行
    for (let i = dataEndRow + 1; i <= lastRow; i++) {
      ws['!rows'][i] = { hpx: 22 };
    }
    // 尾部标题行加高
    if (footerStartRow + 1 <= lastRow) ws['!rows'][footerStartRow + 1] = { hpx: 26 }; // 来源声明标题
    // 法务定稿行加高
    ws['!rows'][lastRow] = { hpx: 30 };

    // ========== 合并单元格 ==========
    let merges = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: colCount - 1 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: colCount - 1 } },
      { s: { r: 2, c: 0 }, e: { r: 2, c: colCount - 1 } },
    ];
    for (let i = 0; i < footerRows.length; i++) {
      const r = dataEndRow + i;
      if (footerRows[i][0]) {
        merges.push({ s: { r: r, c: 0 }, e: { r: r, c: colCount - 1 } });
      }
    }
    ws['!merges'] = merges;

    // ========== 逐格应用样式 ==========
    const colCountEffective = colCount;

    // Row 0: 声明D — 黄底·深琥珀文字·加粗
    for (let c = 0; c < colCountEffective; c++) {
      const addr = XLSX.utils.encode_cell({ r: 0, c });
      if (ws[addr]) ws[addr].s = STYLE_HEADER_ROW;
    }

    // Row 1: 元信息
    for (let c = 0; c < colCountEffective; c++) {
      const addr = XLSX.utils.encode_cell({ r: 1, c });
      if (ws[addr]) ws[addr].s = STYLE_META;
    }

    // Row 2: K值说明（同声明行样式）
    for (let c = 0; c < colCountEffective; c++) {
      const addr = XLSX.utils.encode_cell({ r: 2, c });
      if (ws[addr]) ws[addr].s = STYLE_HEADER_ROW;
    }

    // Row 3: 表头
    for (let c = 0; c < colCountEffective; c++) {
      const addr = XLSX.utils.encode_cell({ r: 3, c });
      if (ws[addr]) ws[addr].s = STYLE_COL_HEADER;
    }

    // 数据行（按冲稳保着色 + 序号居中）
    dataRows.forEach((row, i) => {
      const r = 4 + i;
      const tag = (list[i] && list[i].tag_ckwb) || '';
      const rowStyle = getDataStyle(tag);
      for (let c = 0; c < colCountEffective; c++) {
        const addr = XLSX.utils.encode_cell({ r, c });
        if (ws[addr]) {
          const s = JSON.parse(JSON.stringify(rowStyle));
          // 第一列（序号）居中
          if (c === 0) s.alignment.horizontal = 'center';
          // 冲稳保列居中
          if (c === 1) s.alignment.horizontal = 'center';
          // 服从调剂列左对齐
          if (c === 11) s.alignment.horizontal = 'left';
          ws[addr].s = s;
        }
      }
    });

    // 尾部行
    footerRows.forEach((fRow, i) => {
      const r = dataEndRow + i;
      const text = fRow[0] || '';
      // 来源声明标题行加粗
      const isTitle = text.startsWith('📎 来源与时效声明');
      const isLegal = text.startsWith('⚠️ 法务定稿');
      const isSubTitle = text.startsWith('专业组录取位次/分数（逐校列出）');

      let fStyle;
      if (isLegal) fStyle = STYLE_LEGAL;
      else if (isTitle || isSubTitle) fStyle = STYLE_FOOTER_TITLE;
      else fStyle = STYLE_FOOTER;

      for (let c = 0; c < colCountEffective; c++) {
        const addr = XLSX.utils.encode_cell({ r, c });
        if (ws[addr]) ws[addr].s = fStyle;
      }
    });

    // 特殊处理：空行的最后一个单元格也要加样式（避免无框线）
    for (let r = 0; r <= lastRow; r++) {
      for (let c = 0; c < colCountEffective; c++) {
        const addr = XLSX.utils.encode_cell({ r, c });
        if (!ws[addr]) {
          // 创建空单元格带默认样式
          ws[addr] = { t: 's', v: '' };
          const dummyStyle = style(null, null, null, BORDER_THIN);
          ws[addr].s = dummyStyle;
        }
      }
    }

    XLSX.utils.book_append_sheet(wb, ws, '志愿草表');
    XLSX.writeFile(wb, '高考志愿草表_位次' + (appData.rank || '未知') + '.xlsx');
    showToast('✅ Excel 已导出（13列·含完整声明·样式优化）', 'success');
  } catch(e) {
    console.error('导出 XLSX 失败:', e);
    showToast('❌ 导出失败: ' + e.message, 'error');
  }
}

// ----- Toast Notification -----
function showToast(msg, type) {
  type = type || 'info';
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 3200);
}

// ----- Network Status -----
(function initNetworkStatus() {
  const bar = document.createElement('div');
  bar.className = 'network-bar';
  bar.id = 'networkBar';
  document.body.prepend(bar);
  function update() {
    const b = document.getElementById('networkBar');
    if (!b) return;
    if (!navigator.onLine) {
      b.className = 'network-bar offline show';
      b.textContent = '⚠️ 网络已断开，部分功能不可用';
    } else {
      b.className = 'network-bar online show';
      b.textContent = '✅ 网络已恢复';
      setTimeout(() => b.classList.remove('show'), 2000);
    }
  }
  window.addEventListener('offline', update);
  window.addEventListener('online', update);
})();

// ----- Theme Toggle -----
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('gaokao-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('gaokao-theme', 'light');
  }
  updateThemeBtn();
}
function updateThemeBtn() {
  const btn = document.getElementById('themeToggleBtn');
  if (!btn) return;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  btn.textContent = isLight ? '🌙' : '☀️';
  btn.title = isLight ? '切换到深色模式' : '切换到浅色模式';
}

// ----- Stage Navigation -----
function navigateToStage(stage) {
  if (appData.stage === 4 && _t4Working.length > 0) saveData(appData);
  setStage(stage, 0);
  const f = { 0: ()=>runStage0(0), 1: ()=>runStage1(0), 2: ()=>runStage2(0), 3: ()=>runStage3(0), 4: ()=>runStage4(0), 5: ()=>runStage5(0) };
  if (f[stage]) f[stage]();
  showToast('已跳转到阶段 ' + (stage+1), 'info');
}

// ----- Progress Bar -----
function updateProgressBar() {
  const fill = document.getElementById('progressBarFill');
  const label = document.getElementById('progressBarLabel');
  const markersEl = document.getElementById('progressBarMarkers');
  const tooltipEl = document.getElementById('progressBarTooltip');
  if (!fill) return;

  const stageNames = ['声明','基本信息','专业解读','深入探索','数据录入','最终报告'];
  const stageDescs = [
    '阅读声明并确认开始',
    '填写省份、分数、位次、选科',
    'T1专业初筛 + T2个人画像 + AI解读',
    'Top3专业确认 + 城市探索 + 偏好收集',
    '搜索院校数据 + 手动补充 + 候选草表',
    '生成最终填报报告'
  ];
  const curStage = Math.min(appData.stage, 5);
  const completed = Math.min(curStage * 16 + (appData.stageStep||0) * 4, 96);
  fill.style.width = completed + '%';
  if (label) label.textContent = '当前：' + stageNames[curStage] + '（' + completed + '%）';

  // Render markers (stage boundaries at ~16.67% intervals)
  if (markersEl) {
    let mh = '';
    for (let i = 0; i < 6; i++) {
      const left = (i / 5) * 100;
      const cls = i < curStage ? 'done' : (i === curStage ? 'current' : '');
      mh += '<div class="progress-bar-marker ' + cls + '" style="left:' + left + '%"></div>';
    }
    markersEl.innerHTML = mh;
  }

  // Render tooltip
  if (tooltipEl) {
    let th = '';
    for (let i = 0; i < 6; i++) {
      const icon = i < curStage ? '\u2713' : (i === curStage ? '\u25CF' : '\u25CB');
      const cls = i < curStage ? 'done' : (i === curStage ? 'current' : '');
      th += '<div class="progress-bar-tooltip-row ' + cls + '">'
        + '<span class="tip-icon">' + icon + '</span>'
        + '<span class="tip-stage">' + i + '</span>'
        + '<span>' + stageNames[i] + '</span>'
        + '<span style="opacity:0.6;margin-left:4px">\u2014 ' + stageDescs[i] + '</span>'
        + '</div>';
    }
    tooltipEl.innerHTML = th;
  }
}

// ----- Dynamic Placeholder -----
function updateInputPlaceholder() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const ph = { 0:'输入省份名称，或点击上方按钮…', 1:'输入位次或分数…', 2:'有问题尽管问…', 3:'告诉我你的想法…', 4:'在搜索中心操作，或在这里问我…', 5:'查看报告，或在这里问我…' };
  input.placeholder = ph[appData.stage] || '输入你的想法…';
}

// ----- Table Sort -----
let _sortState = {};
function sortTable(tableId, colIdx, dataType) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const tbody = table.querySelector('tbody');
  if (!tbody) return;
  const rows = Array.from(tbody.rows);
  const asc = _sortState[tableId+colIdx] = !_sortState[tableId+colIdx];
  rows.sort((a,b) => {
    let va = a.cells[colIdx]?.textContent.trim()||'';
    let vb = b.cells[colIdx]?.textContent.trim()||'';
    if (dataType==='num'||dataType==='k') {
      va = parseFloat(va.match(/[d.]+/)?.[0])||0;
      vb = parseFloat(vb.match(/[d.]+/)?.[0])||0;
    }
    return asc ? (va>vb?1:-1) : (va<vb?1:-1);
  });
  rows.forEach(r=>tbody.appendChild(r));
  tbody.closest('table').querySelectorAll('.sort-arrow').forEach(a=>a.textContent='↕');
  const th = tbody.closest('table').querySelectorAll('th')[colIdx];
  if (th) { const ar = th.querySelector('.sort-arrow')||document.createElement('span'); ar.className='sort-arrow'; ar.textContent=asc?'↑':'↓'; if(!th.querySelector('.sort-arrow')) th.appendChild(ar); }
}


function resetAll() {
  try {
    // 二次确认
    if (!confirm('确定要清除所有数据重新开始吗？此操作不可恢复。')) return;

    // 1. 清除持久化数据
    localStorage.removeItem(STORAGE_KEY);

    // 2. 重置全局状态
    appData = getDefaultData();
    saveData(appData); // 立即持久化干净的默认状态
    _t4Working = [];
    _profileCache = null;
    _smartSearchActive = false;
    window._quickReplyHandler = null;
    window._messageHandler = null;

    // 3. 清除 UI
    chatContainer.innerHTML = '';
    clearQuickReplies();
    updateStageIndicator(0);
    updateProgressBar();

    // 4. 重新开始对话
    runStage0(0);
  } catch(e) {
    // 兜底：如果上面任何一步出问题，直接刷新页面
    location.reload();
  }
}
