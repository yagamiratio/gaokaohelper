<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考志愿填报助手 — AI对话引导</title>
<style>
/* ============ CSS Variables & Theme ============ */
:root {
  --bg: #0a0e17;
  --bg-secondary: #111827;
  --bg-chat: #0f1724;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.3);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --border: rgba(255,255,255,0.06);
  --border-light: rgba(255,255,255,0.1);
  --glass: rgba(15,23,36,0.85);
  --glass-border: rgba(255,255,255,0.08);
  --msg-ai-bg: #1a2332;
  --msg-user-bg: #1e3a5f;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --radius: 12px;
  --radius-lg: 16px;
  --font-mono: 'Cascadia Code','Fira Code','JetBrains Mono',monospace;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

/* ============ Light Theme ============ */
[data-theme="light"] {
  --bg: #f0f4f8;
  --bg-secondary: #ffffff;
  --bg-chat: #f8fafc;
  --bg-card: #ffffff;
  --bg-card-hover: #f1f5f9;
  --text: #1e293b;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --accent: #2563eb;
  --accent-glow: rgba(37,99,235,0.15);
  --success: #059669;
  --warning: #d97706;
  --danger: #dc2626;
  --border: rgba(0,0,0,0.1);
  --border-light: rgba(0,0,0,0.06);
  --glass: rgba(255,255,255,0.9);
  --glass-border: rgba(0,0,0,0.08);
  --msg-ai-bg: #f1f5f9;
  --msg-user-bg: #dbeafe;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --input-bg: #ffffff;
  --hover-bg: rgba(0,0,0,0.04);
}
[data-theme="light"] body::before {
  background:
    linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
}
[data-theme="light"] .msg-ai { background: var(--msg-ai-bg); border-color: var(--border-light); }
[data-theme="light"] .msg-user { background: var(--msg-user-bg); }
[data-theme="light"] .msg-user .msg-bubble { color: #1e3a5f; }
[data-theme="light"] .modal-overlay { background: rgba(0,0,0,0.4); }
[data-theme="light"] .inline-table-wrapper { background: rgba(0,0,0,0.02); }
[data-theme="light"] .inline-table th { background: #eff6ff; }
[data-theme="light"] .inline-table tr:hover td { background: #f8fafc; }
[data-theme="light"] .app-header { background: rgba(255,255,255,0.9); }
[data-theme="light"] .quick-reply { background: var(--bg-card); }
[data-theme="light"] .btn:hover { background: rgba(0,0,0,0.04); }
[data-theme="light"] .btn-icon:hover { background: rgba(0,0,0,0.04); color: var(--text); }
[data-theme="light"] .msg-code-block { background: #f1f5f9; color: #334155; }
[data-theme="light"] .modal-table th { background: #eff6ff; }
[data-theme="light"] .modal-table tr:hover td { background: #f8fafc; }
[data-theme="light"] .modal-table input[type="text"],
[data-theme="light"] .modal-table textarea,
[data-theme="light"] .modal-table select { background: #ffffff; }
[data-theme="light"] .candidate-edit-table th { background: #eff6ff; }
[data-theme="light"] .candidate-edit-table tr:hover td { background: #f8fafc; }
[data-theme="light"] .candidate-edit-table input { background: #ffffff; }
[data-theme="light"] .paste-area { background: #ffffff; }
[data-theme="light"] .manual-entry input,
[data-theme="light"] .manual-entry select { background: #ffffff; }
[data-theme="light"] .search-link-card { background: var(--bg-card); }
[data-theme="light"] .chat-input { background: #ffffff; }
[data-theme="light"] .t1-search-box { background: #ffffff; }
[data-theme="light"] .theme-toggle-btn { background: var(--bg-card); }
[data-theme="light"] .search-confirm-item { background: var(--bg-card); }
/* Subtle grid background */
body::before {
  content: '';
  position: fixed; inset:0; z-index:-1;
  background:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ============ Layout ============ */
.app-container {
  max-width: 900px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============ Header ============ */
.app-header {
  padding: 12px 20px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
  flex-shrink: 0;
}
.app-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.app-title .dot { width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Stage indicator */
.stage-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
}
.stage-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  border: 2px solid var(--border-light);
  color: var(--text-muted);
  transition: all var(--transition);
  position: relative;
}
.stage-dot.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.1); }
.stage-dot.done { border-color: var(--success); color: var(--success); background: rgba(16,185,129,0.1); }
.stage-connector {
  width: 16px; height: 2px;
  background: var(--border-light);
}
.stage-connector.done { background: var(--success); }

.header-actions { display:flex; gap:8px; }
.btn-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all var(--transition);
}
.btn-icon:hover { background: rgba(255,255,255,0.05); color: var(--text); }

/* ============ Chat Area ============ */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.chat-container::-webkit-scrollbar { width: 4px; }
.chat-container::-webkit-scrollbar-track { background: transparent; }
.chat-container::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

/* Message bubble */
.msg {
  max-width: 85%;
  animation: msgIn 0.3s ease-out;
}
@keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bubble {
  padding: 12px 16px;
  border-radius: var(--radius-lg);
  line-height: 1.65;
  font-size: 14px;
  word-break: break-word;
}
.msg.ai .msg-bubble { background: var(--msg-ai-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--msg-user-bg); border: 1px solid rgba(59,130,246,0.2); border-bottom-right-radius: 4px; }
.msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }
.msg.user .msg-time { text-align: right; }

/* Typing indicator */
.typing-indicator {
  display: flex; gap: 4px; padding: 8px 0;
}
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite both;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

/* ============ Quick Replies ============ */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px 0;
}
.quick-reply {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border-light);
  background: var(--glass);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  transition: all var(--transition);
  white-space: nowrap;
}
.quick-reply:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.1); }
.quick-reply.primary { border-color: var(--accent); background: rgba(59,130,246,0.15); color: var(--accent); }
.quick-reply.freechat { border-style: dashed; border-color: var(--text-muted); color: var(--text-muted); font-size: 11px; }
.quick-reply.freechat:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.08); }

/* ============ Input Area ============ */
.input-area {
  padding: 12px 20px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border-light);
  background: var(--bg-secondary);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  outline: none;
  transition: border-color var(--transition);
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text-muted); }
.btn-send {
  width: 42px; height: 42px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.btn-send:hover { filter: brightness(1.15); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* ============ Inline Table (chat) ============ */
.inline-table-wrapper {
  margin: 8px 0;
  overflow-x: auto;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  background: rgba(0,0,0,0.2);
}
.inline-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 800px;
}
.inline-table th {
  background: rgba(59,130,246,0.1);
  padding: 8px 10px;
  text-align: left;
  font-weight: 600;
  color: var(--accent);
  border-bottom: 2px solid var(--border-light);
  white-space: nowrap;
}
.inline-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.inline-table tr:hover td { background: rgba(255,255,255,0.02); }
.inline-table .tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600; }
.inline-table .tag-chong { background:rgba(245,158,11,0.15); color:var(--warning); }
.inline-table .tag-wen { background:rgba(59,130,246,0.15); color:var(--accent); }
.inline-table .tag-bao { background:rgba(16,185,129,0.15); color:var(--success); }
.inline-table .tag-taichong { background:rgba(239,68,68,0.15); color:var(--danger); }

/* Global tag styles for candidate summary */
.tag-chong { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; background:rgba(245,158,11,0.15); color:var(--warning); }
.tag-wen { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; background:rgba(59,130,246,0.15); color:var(--accent); }
.tag-bao { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; background:rgba(16,185,129,0.15); color:var(--success); }

/* ============ Content Blocks in Chat ============ */
.msg-content-block {
  margin: 8px 0;
  padding: 10px 14px;
  border-radius: var(--radius);
  border-left: 3px solid var(--accent);
  background: rgba(59,130,246,0.05);
}
.msg-content-block.warning { border-left-color: var(--warning); background: rgba(245,158,11,0.05); }
.msg-content-block.danger { border-left-color: var(--danger); background: rgba(239,68,68,0.05); }
.msg-content-block.success { border-left-color: var(--success); background: rgba(16,185,129,0.05); }

.msg-code-block {
  margin: 8px 0;
  padding: 10px 14px;
  border-radius: var(--radius);
  background: rgba(0,0,0,0.3);
  font-family: var(--font-mono);
  font-size: 12px;
  overflow-x: auto;
  white-space: pre-wrap;
  border: 1px solid var(--border);
}

/* Inline links */
.msg-link {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}

/* ============ Modals ============ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  max-width: 95vw;
  max-height: 90vh;
  width: 1100px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-body {
  flex: 1;
  overflow: auto;
  padding: 16px 20px;
}
.modal-body::-webkit-scrollbar { width:4px; }
.modal-body::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:2px; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.btn {
  padding: 8px 20px;
  border-radius: var(--radius);
  border: 1px solid var(--border-light);
  background: var(--glass);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all var(--transition);
}
.btn:hover { background: rgba(255,255,255,0.05); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn-primary:hover { filter: brightness(1.15); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Modal table */
.modal-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.modal-table th {
  background: rgba(59,130,246,0.1);
  padding: 8px;
  text-align: left;
  font-weight: 600;
  color: var(--accent);
  border-bottom: 2px solid var(--border-light);
  white-space: nowrap;
  position: sticky; top: 0;
}
.modal-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.modal-table tr:hover td { background: rgba(255,255,255,0.02); }
.modal-table input[type="text"], .modal-table textarea, .modal-table select {
  background: var(--bg);
  border: 1px solid var(--border-light);
  color: var(--text);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
  font-family: inherit;
  width: 100%;
}
.modal-table textarea { resize: vertical; min-height: 36px; }
.modal-table select { cursor: pointer; }

/* ============ Search Hub / Data Entry (Stage 4) ============ */
.search-hub { padding: 0; }
.search-section { margin-bottom: 20px; }
.search-section h3 {
  font-size: 14px; font-weight: 600;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.search-links {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 12px;
}
.search-link-card {
  flex: 1; min-width: 200px;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  color: var(--text);
  font-size: 12px;
  line-height: 1.5;
}
.search-link-card:hover {
  border-color: var(--accent);
  background: rgba(59,130,246,0.05);
}
.search-link-card .label {
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  display: block; margin-bottom: 2px;
}
.search-link-card .hint {
  color: var(--text-muted);
  font-size: 11px;
}

/* Paste area */
.paste-area {
  width: 100%; min-height: 120px;
  background: var(--bg);
  border: 2px dashed var(--border-light);
  border-radius: var(--radius);
  color: var(--text);
  padding: 12px;
  font-size: 12px;
  font-family: var(--font-mono);
  resize: vertical;
  transition: border-color var(--transition);
}
.paste-area:focus { border-color: var(--accent); outline: none; }
.paste-hint {
  font-size: 11px; color: var(--text-muted);
  margin-bottom: 6px; line-height: 1.5;
}
.parse-result {
  margin-top: 10px;
  padding: 8px 12px;
  background: rgba(16,185,129,0.08);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: var(--radius);
  font-size: 12px; color: var(--success);
  display: none;
}

/* Manual entry form */
.manual-entry {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.manual-entry input, .manual-entry select {
  background: var(--bg);
  border: 1px solid var(--border-light);
  color: var(--text);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 12px;
  font-family: inherit;
}
.manual-entry input:focus, .manual-entry select:focus {
  border-color: var(--accent); outline: none;
}
.manual-entry input::placeholder { color: var(--text-muted); }

/* Candidate edit table */
.candidate-edit-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
.candidate-edit-table th {
  background: rgba(59,130,246,0.1);
  padding: 6px 8px;
  text-align: left;
  font-size: 11px;
  color: var(--accent);
  border-bottom: 1px solid var(--border-light);
  white-space: nowrap;
  position: sticky; top: 0;
}
.candidate-edit-table td {
  padding: 4px 6px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.candidate-edit-table tr:hover td { background: rgba(255,255,255,0.02); }
.candidate-edit-table input {
  background: var(--bg);
  border: 1px solid var(--border-light);
  color: var(--text);
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  width: 100%;
  font-family: inherit;
}
.candidate-edit-table input:focus { border-color: var(--accent); outline: none; }

.k-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-mono);
}
.k-badge.chong { background: rgba(245,158,11,0.15); color: var(--warning); }
.k-badge.wen { background: rgba(16,185,129,0.15); color: var(--success); }
.k-badge.bao { background: rgba(59,130,246,0.15); color: var(--accent); }
.k-badge.taichong { background: rgba(239,68,68,0.15); color: var(--danger); }

.btn-danger-sm {
  padding: 2px 8px; font-size: 10px;
  border: 1px solid rgba(239,68,68,0.3);
  background: rgba(239,68,68,0.1);
  color: var(--danger);
  border-radius: 4px;
  cursor: pointer;
}
.btn-danger-sm:hover { background: rgba(239,68,68,0.2); }

.candidate-summary {
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(59,130,246,0.05);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  font-size: 12px;
  line-height: 1.6;
}

/* Smart search status */
.search-status {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.search-status.searching {
  background: rgba(59,130,246,0.06);
  border: 1px solid rgba(59,130,246,0.15);
  color: var(--primary);
}
.search-status.success {
  background: rgba(16,185,129,0.06);
  border: 1px solid rgba(16,185,129,0.15);
}
.search-status.warning {
  background: rgba(245,158,11,0.06);
  border: 1px solid rgba(245,158,11,0.15);
  color: var(--warning);
}
.search-status.error {
  background: rgba(239,68,68,0.06);

// 专业组"干净度"检查工具函数
function getRejectedMajors(t1Data) {
  if (!t1Data) return [];
  return t1Data.filter(r => r.consider === '否').map(r => ({ name: r.major.replace(/^\d+\s*/, ''), cat: r.cat }));
}

function checkGroupCleanliness(schoolName, rejectedMajors) {
  if (!rejectedMajors || rejectedMajors.length === 0) return { clean: true, risks: [] };
  const risks = [];
  const s = (schoolName || '').toLowerCase();
  for (const rm of rejectedMajors) {
    const kw = rm.name.toLowerCase();
    // 匹配学校名是否暗示以拒绝专业为优势方向
    const kwShort = kw.substring(0, 2);
    if (s.includes(kw) || s.includes(kwShort)) {
      risks.push({ rejectedMajor: rm.name, level: '高危', reason: '该校以"' + rm.name + '"为优势方向，该组可能分配至你拒绝的相关专业' });
    }
  }
  return { clean: risks.length === 0, risks };
}

// 动态年份计算（技能要求：按运行时反推近2-3届）
function getDataYear() {
  const now = new Date();
  const y = now.getFullYear();
  // 8月前当年录取尚未放榜，主参考上一年
  return (now.getMonth() + 1) < 8 ? y - 1 : y;
}
function getDataYearShort() { return String(getDataYear()); }
function getDataYearRange() {
  const p = getDataYear();
  return p + '/' + (p - 1) + '/' + (p - 2);
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      const def = getDefaultData();
      for (const k of Object.keys(def)) {
        if (!(k in d)) d[k] = def[k];
      }
      // Schema migration: if t2Data uses old group names, reset to new structure
      const oldT2Groups = ['家庭关系','经济关系','自我评估','金钱观念'];
      const newT2Groups = ['分数情况','地域倾向','经济能力','个人偏好','未来规划'];
      if (d.t2Data && d.t2Data.length > 0) {
        const firstGroup = d.t2Data[0].group;
        if (oldT2Groups.includes(firstGroup) && !newT2Groups.includes(firstGroup)) {
          d.t2Data = def.t2Data;
        }
      }
      return d;
    }
  } catch(e) {}
  return getDefaultData();
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

// 选科硬过滤矩阵（对齐 SKILL.md 推荐流水线第1步）
// 返回 { compatible:boolean, reason:string }
function checkSubjectCompatibility(subjects, examType, majorCat) {
  const et = examType || '';
  const subj = (subjects || '').toLowerCase();
  const cat = majorCat || '';

  // 老高考
  if (et.includes('老高考')) {
    if (et.includes('文科') || et.includes('文')) {
      // 文科不能报理工农医
      const forbidden = /工|理|医|农/;
      if (forbidden.test(cat)) {
        return { compatible: false, reason: '老高考文科不能报考理工农医类专业' };
      }
      return { compatible: true, reason: '' };
    }
    // 理科可以报所有
    return { compatible: true, reason: '' };
  }

  // 3+3 — 不限组合，但个别专业有单科要求
  if (et === '3+3') {
    // 医学类通常要求化学/生物
    if (cat.includes('10') || cat.includes('医学')) {
      if (!subj.includes('化') && !subj.includes('生')) {
        return { compatible: false, reason: '医学类专业通常要求化学或生物选考，建议核实目标院校招生简章' };
      }
    }
    // 工学类通常要求物理
    if (cat.includes('08') || cat.includes('工')) {
      if (!subj.includes('物')) {
        return { compatible: false, reason: '工学类专业通常要求物理选考，建议核实目标院校招生简章' };
      }
    }
    return { compatible: true, reason: '' };
  }

  // 3+1+2 物理类
  if (et.includes('物理')) {
    // 历史类受限：纯人文社科（历史学、哲学、部分文学）建议走历史类
    // 物理类可以报绝大多数专业
    // 少数专业有化学/生物额外要求
    if ((cat.includes('10') || cat.includes('医学')) && cat !== '10 医学' && cat !== '10' && !subj.includes('化') && !subj.includes('生')) {
      return { compatible: false, reason: '该医学方向通常需要化学或生物作为再选科目' };
    }
    if (/化学|化工|药学|材料|环境|生物/.test(cat) && !subj.includes('化')) {
      return { compatible: true, reason: '⚠️ 部分院校该方向要求化学选考，建议核实' };
    }
    return { compatible: true, reason: '' };
  }

  // 3+1+2 历史类
  if (et.includes('历史')) {
    // 历史类可报：文/史/哲/教育/管理/经济/部分法学/语言/新闻/艺术
    const forbidden = /工|理|医|农|08|07|09/;
    // 07理学中部分（地理科学、心理学等）历史类可报
    if (/地理科学|心理学/.test(cat)) {
      return { compatible: true, reason: '' };
    }
    if (forbidden.test(cat) && !/地理科学|心理学/.test(cat)) {
      return { compatible: false, reason: '3+1+2历史类通常不能报考理工农医类专业' };
    }
    return { compatible: true, reason: '' };
  }

  return { compatible: true, reason: '' };
}

let appData = loadData();

// ============================================================================

// ============================================================================
const chatContainer = document.getElementById('chatContainer');
const quickRepliesContainer = document.getElementById('quickRepliesContainer');
const chatInput = document.getElementById('chatInput');
const btnSend = document.getElementById('btnSend');

function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addAIMessage(html, quickReplies) {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-bubble">${html}</div><div class="msg-time">${formatTime()}</div>`;
  chatContainer.appendChild(div);
  scrollToBottom();
  if (quickReplies && quickReplies.length > 0) {
    // Always append "随便问问" as the last button for free-form Q&A
    const allReplies = [...quickReplies, {text:'💬 随便问问', freechat:true}];
    renderQuickReplies(allReplies);
  }
  return div;
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div><div class="msg-time">${formatTime()}</div>`;
  chatContainer.appendChild(div);
  scrollToBottom();
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  chatContainer.appendChild(div);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function renderQuickReplies(replies) {
  quickRepliesContainer.innerHTML = replies.map((r, i) => {
    let cls = 'quick-reply';
    if (r.primary) cls += ' primary';
    if (r.freechat) cls += ' freechat';
    return `<button class="${cls}" onclick="handleQuickReply(${i})">${escapeHtml(r.text)}</button>`;
  }).join('');
}

function clearQuickReplies() {
  quickRepliesContainer.innerHTML = '';
}

function handleQuickReply(idx) {
  // Get the last button element to check if it's the freechat button
  const buttons = quickRepliesContainer.querySelectorAll('.quick-reply');
  const clickedBtn = buttons[idx];
  const isFreeChat = clickedBtn && clickedBtn.classList.contains('freechat');

  if (isFreeChat) {
    enterFreeChat('好的，你可以随便问我高考志愿相关的问题！<br>比如专业解读、院校对比、录取规则、就业前景等等。<br><br>想回到填报流程时，点<strong>"开始填报"</strong>就行。');
    return;
  }

  // Normal stage handler
  if (window._quickReplyHandler) {
    window._quickReplyHandler(idx);
  }
}

function formatTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ============================================================================
// SECTION 4: INPUT HANDLING
// ============================================================================
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  // Auto-resize
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
}

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  addUserMessage(text);
  chatInput.value = '';
  chatInput.style.height = 'auto';
  clearQuickReplies();

  // 1) If no handler set → always fallback to AI
  if (!window._messageHandler) {
    askAI(text);
    return;
  }

  // 2) Detect if this is a general question (not a stage input)
  //    Stage inputs: numbers, province names, confirmations, short answers
  //    Questions: has 吗/？/怎么样/是什么/为什么/怎么/多少/哪/能不能/什么意思
  const isQuestion = /[吗？?]|怎么样|是什么|为什么|怎么|如何|哪[所些个]|能不能|可不可以|什么意思|含义|区别|对比|前景|就业|薪资|学费|学制|培养|课程/.test(text);
  const isStageInput = /^\d{2,6}$|^\d{2,6}\s*(分|位次|名|排名)?$|知道了|继续|同意|好的|可以|是的|对|没错|行|嗯|不|安徽|广东|江苏|山东|河南|四川|浙江|湖南|湖北|河北|福建|江西|广西|云南|贵州|重庆|北京|上海|天津|陕西|山西|甘肃|宁夏|新疆|青海|西藏|内蒙古|黑龙江|吉林|辽宁|海南|物理|历史|物化生|物化地|物生地|史地政|历政地/.test(text);

  if (isQuestion && !isStageInput) {
    // Looks like a general question → route to AI
    askAI(text);
    return;
  }

  // 3) Normal stage flow
  window._messageHandler(text);
}

let _askAiBusy = false;

async function askAI(question) {
  if (_askAiBusy) return;

  const cfg = window.APP_CONFIG || {};
  const botId = cfg.botId || '';
  const apiKey = cfg.apiKey || '';

  // Check if API is configured (not placeholder)
  if (!botId || botId.includes('bot-20')) {
    // botId is configured (bot-2026...) — but check apiKey too
    if (!apiKey || apiKey.length < 10) {
      addAIMessage('💡 <em>AI问答功能需要配置API Key，请将火山引擎的API Key填入config.js。</em>');
    } else {
      // Try API call
    }
  }

  if (!botId || !apiKey || apiKey.length < 10) {
    // No API configured → use a simple canned response for common questions
    addAIMessage(cannedResponse(question));
    return;
  }

  _askAiBusy = true;
  addTypingIndicator();

  try {
    const resp = await fetch(cfg.arkEndpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: botId,
        messages: [
          { role: 'system', content: '你是高考志愿填报助手。回答要简洁、专业、具体。用中文回答。如果用户问的是具体院校/专业，尽量给出录取分数、位次、就业前景等实用信息。如果数据不确定，请注明需要去官方渠道核实。' },
          { role: 'user', content: question }
        ],
        temperature: 0.7,
        max_tokens: 1000,
        stream: false
      })
    });

    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回答这个问题。';

    removeTypingIndicator();
    addAIMessage(reply, [
      {text:'开始填报', primary:true},
      {text:'继续问'}
    ]);
    window._quickReplyHandler = (idx) => {
      if (idx === 0) {
        if (!appData.agreed) { stage0_showMergedDeclaration(); }
        else { clearQuickReplies(); stage0_done(); }
      }
    };
    window._messageHandler = (text) => {
      if (/开始|填报|报志愿|帮我/.test(text)) {
        if (!appData.agreed) { stage0_showMergedDeclaration(); }
        else { clearQuickReplies(); stage0_done(); }
      } else {
        askAI(text);
      }
    };
  } catch (err) {
    removeTypingIndicator();
    addAIMessage('⚠️ 网络出错，AI问答暂时不可用。<br>' + cannedResponse(question));
  } finally {
    _askAiBusy = false;
  }
}

  if (/口腔|牙/.test(q)) return '口腔医学是5年制本科，核心课程包括口腔解剖生理学、口腔组织病理学、口腔内科学、口腔颌面外科学、口腔修复学等。就业方向：综合医院口腔科、口腔专科医院、口腔诊所。近年录取位次因省份和院校差异很大，建议你说出具体省份和目标分数，我帮你分析。';
  if (/临床医学/.test(q)) return '临床医学是5年制本科+3年规培，核心课程包括人体解剖学、生理学、病理学、药理学、内科学、外科学等。就业：各级医院、社区卫生服务中心。分数要求普遍较高，985/211医学院线通常在全省前3%-5%。';

  if (/冲稳保/.test(q)) return '冲稳保是用你的全省位次和学校专业组往年录取位次做对比：<br>• <strong>冲</strong>：专业组位次略高于你（k<0.95），有希望但没把握<br>• <strong>稳</strong>：专业组位次和你接近（0.95≤k≤1.08）<br>• <strong>保</strong>：专业组位次明显低于你（k>1.08），比较安全<br>其中 k = 专业组位次 / 你的位次。<br><br><strong>⚠️ 注意：同校不同专业组位次可能差数万名，必须用专业组/专业位次，不能只看院校整体最低位次。</strong><br><br>告诉我你的位次和志愿专业，我可以帮你算。';
  if (/就业|前景|薪资/.test(q)) return '不同专业的就业前景差异很大。<br>医学类：稳定但培养周期长（5年本科+3年规培）<br>计算机类：薪资高但竞争激烈、更新快<br>师范类：稳定、有寒暑假、编制竞争大<br>金融类：薪资两极化，头部机构门槛高<br>工科类：就业面广，制造业和基建需求稳定<br><br>你对哪个方向感兴趣？说出具体专业我帮你详细分析。';
  if (/录取|分数线|多少分/.test(q)) return '录取分数每年都在变，取决于当年考生整体分数和报考热度。有参考价值的是<strong>位次（全省排名）</strong>——学校录取位次比分数稳定得多。<br><br>告诉我你的省份、位次（或分数）、想报的专业方向，我帮你分析。你也可以点击"开始填报"进入正式填报流程。';
  if (/学校|大学|院校/.test(q)) return '选学校可以从这几个维度考虑：<br>• <strong>层次</strong>：985/211/双一流/普本/民办<br>• <strong>地域</strong>：一线城市 vs 省内 vs 偏远<br>• <strong>专业实力</strong>：该校目标专业是否有博士点/国家重点学科<br>• <strong>就业</strong>：该校毕业生的主要去向和薪资<br><br>告诉我你考虑的学校和专业，我帮你分析对比。';
  return '这个问题我暂时没有预设答案。不过你可以：<br>• 点击<strong>"开始填报"</strong>进入正式填报流程<br>• 继续问我其他高考志愿相关问题<br>• 告诉我你更具体想问什么';

// ============================================================================
// SECTION 5: STAGE FLOW — 阶段流程控制
// ============================================================================
function updateStageIndicator(stage) {
  updateProgressBar();
  updateInputPlaceholder();
  document.querySelectorAll('.stage-dot').forEach(dot => {
    const s = parseInt(dot.dataset.stage);
    dot.classList.remove('active','done');
    if (s === stage) dot.classList.add('active');
    else if (s < stage) dot.classList.add('done');
  });
  document.querySelectorAll('.stage-connector').forEach((conn, i) => {
    if (i < stage) conn.classList.add('done');
    else conn.classList.remove('done');
  });
}

function setStage(stage, step) {
  appData.stage = stage;
  appData.stageStep = step || 0;
  saveData(appData);
  updateStageIndicator(stage);
  updateProgressBar();
}

// ============================================================================
// SECTION 6: STAGE HANDLERS — 每个阶段的对话逻辑
// ============================================================================

function startConversation() {
  chatContainer.innerHTML = '';
  clearQuickReplies();

  const stage = appData.stage;
  const step = appData.stageStep;
  updateStageIndicator(stage);

  switch (stage) {
    case 0: runStage0(step); break;
    case 1: runStage1(step); break;
    case 2: runStage2(step); break;
    case 3: runStage3(step); break;
    case 4: runStage4(step); break;
    case 5: runStage5(step); break;
  }
}

// ---- Stage 0: 欢迎 + 一条合并声明 ----
function runStage0(step) {
  if (step === 0) {
    addAIMessage('👋 你好！我是高考志愿填报助手。<br><br>不管你是刚出分、还在纠结专业，还是已经开始圈学校，我都可以陪你一步一步把这件事理清楚。<br><br>你也可以<strong>随时问我任何高考志愿相关的问题</strong>——专业解读、院校对比、政策规则、就业前景等等。', [
      {text:'开始填报志愿', primary:true},
      {text:'先随便问问'}
    ]);
    window._quickReplyHandler = (idx) => {
      if (idx === 0) { stage0_showMergedDeclaration(); }
      else { enterFreeChat('好的，你可以随便问我高考志愿相关的问题！比如：<br>• 某个专业学什么、就业怎么样<br>• 某个学校好不好<br>• 平行志愿怎么填<br>• 什么位次能报什么学校'); }
    };
    window._messageHandler = (text) => {
      // If user types free-form question, route to AI
      if (text.includes('填报') || text.includes('开始') || text.includes('志愿') && text.includes('报')) {
        stage0_showMergedDeclaration();
      } else {
        askAI(text);
      }
    };
  } else if (step === 1) {
    stage0_showMergedDeclaration();
  }
}

function stage0_done() {
  clearQuickReplies();
  setStage(1, 0);
  setTimeout(() => runStage1(0), 500);
}

// ---- Stage 1: 信息收集（A卡 + B卡） ----
function runStage1(step) {
  if (!appData.agreed) { setStage(0, 1); runStage0(1); return; }

  if (step === 0) {
    addAIMessage('好，现在我需要了解一些基本信息。<br><br>首先是A卡——<strong>你是哪个省份的考生？</strong>', [
      {text:'安徽'},{text:'广东'},{text:'江苏'},{text:'山东'},{text:'河南'},{text:'四川'}
    ]);
    window._quickReplyHandler = (idx) => {
      const provinces = ['安徽','广东','江苏','山东','河南','四川'];
      appData.province = provinces[idx];
      saveData(appData);
      stage1_confirmProvince();
    };
    window._messageHandler = (text) => {
      // Check if text matches a province
      const matched = Object.keys(PROVINCE_AUTHORITY).find(p => text.includes(p));
      if (matched) { appData.province = matched; saveData(appData); stage1_confirmProvince(); }
      else { appData.province = text; saveData(appData); stage1_confirmProvince(); }
    };
  } else if (step === 1) {
    stage1_confirmProvince();
  } else if (step === 2) {
    stage1_askSubjects();
  } else if (step === 3) {
    stage1_askScore();
  }
}

function stage1_confirmProvince() {

function stage1_handleScore(text) {
  clearQuickReplies();

  // Parse score info
  if (text.match(/\d{3}/)) {
    const scoreMatch = text.match(/(\d{3})/);
    if (scoreMatch) appData.totalScore = scoreMatch[1];

    const rankMatch = text.match(/位次[：:\s]*(\d[\d,]*)/) || text.match(/(\d[\d,]*)\s*[名位]/);
    if (rankMatch) appData.rank = rankMatch[1].replace(/,/g,'');

    const lineMatch = text.match(/线[：:\s]*(\d{3})/);
    if (lineMatch) appData.batchLine = lineMatch[1];
  }

  saveData(appData);
  setStage(1, 3);

  // Prefill T2 score items
  appData.t2Data.forEach(item => {
    if (item.prefill) {
      if (item.item === '高考总分') item.prefilledValue = appData.totalScore || '';
      if (item.item === '全省位次') item.prefilledValue = appData.rank || '';
      if (item.item === '选科模式') item.prefilledValue = appData.examType || '';
      if (item.item === '各科分数' && text.includes('/')) item.prefilledValue = text;
      if (item.item === '全省批次线') item.prefilledValue = appData.batchLine || '';
    }
  });
  saveData(appData);

  let confirmText = '我记录下来了：';
  if (appData.totalScore) confirmText += `<br>✅ 总分：${appData.totalScore}分`;
  if (appData.rank) confirmText += `<br>✅ 位次：${appData.rank}名`;
  if (appData.batchLine) confirmText += `<br>✅ 批次线：${appData.batchLine}分`;
  confirmText += '<br><br>最后——<strong>你能接受的亏分程度是？</strong>（即能接受报比自己位次高多少的学校）';

  addAIMessage(confirmText, [
    {text:'保守（亏5%以内）'},{text:'适中（亏10%左右）', primary:true},{text:'激进（亏20%，冲就完了）'}
  ]);
  window._quickReplyHandler = (idx) => {
    const levels = ['保守（亏5%以内）','适中（亏10%左右）','激进（亏20%，冲就完了）'];
    appData.deficitTolerance = levels[idx];
    saveData(appData);
    stage1_askRestriction();
  };
}

// ---- Stage 2: T1/T2 专业表 ----
function runStage2(step) {
  if (step === 0) {
    // Present T1 download link and T2
    let msg = '信息收集好了。现在进入最关键的环节——<strong>专业初筛</strong>。<br><br>';
    msg += '📋 <strong>T1 专业初筛表</strong>：12大学科门类，95个专业类。点击<strong>「是」</strong>标记你感兴趣的专业类就行。<br>';
    msg += '支持按门类批量选择，原因可选填。<br><br>';
    msg += '📋 <strong>T2 个人情况分析表</strong>：25项、5组（分数情况/地域倾向/经济能力/个人偏好/未来规划）。<br>';
    msg += '分数情况已从基础信息自动填充，其余4组每组至少填1行即可。参考评测（MBTI/霍兰德）可不填。';

    addAIMessage(msg, [
      {text:'打开T1表', primary:true},
      {text:'先打开T2表'},
      {text:'两张表都打开'}
    ]);
    window._quickReplyHandler = (idx) => {
      if (idx === 0) openT1Modal();
      else if (idx === 1) openT2Modal();
      else { openT1Modal(); setTimeout(() => openT2Modal(), 300); }
    };
    window._messageHandler = (text) => {
      // Detect completion phrases
      const done = /填完|好了|完成|可以了|没问题|继续|下一步|ok|done|next/i;
      if (done.test(text)) {
        addAIMessage('好的，我来检查一下你的填写情况。');
        setStage(2, 1);
        setTimeout(() => runStage2_validation(), 600);
        return;
      }
      if (text.includes('T1') || text.includes('专业')) openT1Modal();
      else if (text.includes('T2') || text.includes('个人')) openT2Modal();
      else { openT1Modal(); }
    };
  } else if (step === 1) {
    // After user says "填完了"
    runStage2_validation();
  }
}

function runStage2_validation() {
  clearQuickReplies();

  // Check T1: at least 1 row with consider=是
  const t1Considered = appData.t1Data.filter(r => r.consider === '是');
  const t1HasReasons = t1Considered.filter(r => r.reason && r.reason.trim() !== '');

  // Check T2: count filled groups (informational only, not blocking)
  const T2_MAIN_GROUPS = ['地域倾向','经济能力','个人偏好','未来规划'];
  const groups = {};
  appData.t2Data.forEach(item => {
    if (!groups[item.group]) groups[item.group] = { total:0, filled:0, items:[] };
    groups[item.group].total++;
    if (item.prefilledValue && item.prefilledValue.trim()) groups[item.group].filled++;
    else { groups[item.group].items.push(item); }
  });
  const t2FilledGroups = T2_MAIN_GROUPS.filter(g => groups[g] && groups[g].filled > 0).length;
  const t2MissingGroups = T2_MAIN_GROUPS.filter(g => !groups[g] || groups[g].filled === 0);

  // CASE 1: T1 has zero "是" — MUST fix
  if (t1Considered.length === 0) {
    addAIMessage(
      '我看了一下——<strong>T1表还没标记任何「是」。</strong><br><br>'
      + '至少需要选<strong>1个</strong>感兴趣的专业类，我才能帮你做分析。<br><br>'
      + '打开T1表，浏览12个门类，看到喜欢的点一下变成「是」就行。',
      [{text:'打开T1表', primary:true}]
    );
    window._quickReplyHandler = (idx) => { if (idx === 0) openT1Modal(); };
    window._messageHandler = (text) => { openT1Modal(); };
    setStage(2, 1);
    return;
  }

  // CASE 2: T1 has selections — that's enough to proceed!
  // Build message about current state
  let msg = '我看了一下你的填写情况：<br><br>';
  msg += '✅ <strong>T1专业初筛</strong>：标记了 <strong>' + t1Considered.length + '</strong> 个「是」的专业类';

  if (t1HasReasons.length === 0) {
    msg += '（原因空着也没关系，我结合其他信息分析）';
  } else {
    msg += '，' + t1HasReasons.length + '个写了原因';
  }
  msg += '<br><br>';

  // T2 status
  if (t2FilledGroups === 0) {
    msg += '📋 <strong>T2个人情况表</strong>：还没填。<br>';
    msg += '填了T2我能做更精准的匹配分析，但不填也能继续——';
    msg += '我会基于你已有的信息（分数/位次/选科/省份）来解读你选的专业。';
  } else if (t2FilledGroups < 4) {
    msg += '📋 <strong>T2个人情况表</strong>：' + t2FilledGroups + '/4组有内容。<br>';
    msg += '我可以结合这些信息做分析。';
  } else {
    msg += '📋 <strong>T2个人情况表</strong>：4组全部有内容 ✅';
  }
  msg += '<br><br>要继续吗？';

  if (t2FilledGroups === 0) {
    // T2 empty: offer both paths
    addAIMessage(msg, [
      {text:'解读这些专业', primary:true},
      {text:'先填T2表'},
      {text:'先补T1原因'}
    ]);
    window._quickReplyHandler = (idx) => {
      if (idx === 0) stage2_generateInterpretation();
      else if (idx === 1) openT2Modal();
      else {
        addAIMessage('请说原因，我帮你记在T1表里。比如："法学类：想考公 电子信息类：喜欢物理"');
        window._messageHandler = (text) => { stage2_handleReasonInput(text); };
      }
    };
    window._messageHandler = (text) => {
      // Text input routing: 继续/解读 → interpretation, T2 → modal, 原因 → reason input
      if (/继续|解读|可以|好的|ok|yes|没问题|go/i.test(text)) {
        stage2_generateInterpretation();
      } else if (/T2|个人|情况/i.test(text)) {
        openT2Modal();
      } else if (/原因|补/.test(text)) {
        addAIMessage('请说原因，我帮你记在T1表里。比如："法学类：想考公 电子信息类：喜欢物理"');
        window._messageHandler = (t) => { stage2_handleReasonInput(t); };
      } else {
        // Default: any text → interpretation
        stage2_generateInterpretation();
      }
    };
  } else {
    // T2 has content: default to interpretation
    addAIMessage(msg, [
      {text:'解读这些专业', primary:true},
      {text:'先补T1原因'},
      {text:'补充T2信息'}
    ]);
    window._quickReplyHandler = (idx) => {
      if (idx === 0) stage2_generateInterpretation();
      else if (idx === 1) {
        addAIMessage('请说原因，我帮你记在T1表里。');
        window._messageHandler = (text) => { stage2_handleReasonInput(text); };
      } else { openT2Modal(); }
    };
    window._messageHandler = (text) => {
      if (/继续|解读|可以|好的|ok|yes|没问题|go/i.test(text)) {
        stage2_generateInterpretation();
      } else if (/T2|补充|个人|情况/i.test(text)) {
        openT2Modal();
      } else if (/原因|补/.test(text)) {
        addAIMessage('请说原因，我帮你记在T1表里。');
        window._messageHandler = (t) => { stage2_handleReasonInput(t); };
      } else {
        stage2_generateInterpretation();
      }
    };
  }
  setStage(2, 1);
}

function stage2_handleReasonInput(text) {
  clearQuickReplies();
  // Try to parse "major: reason" format
  appData.t1Data.forEach(r => {
    if (r.consider === '是' && !r.reason) {
      // Check if text mentions this major
      const keywords = [r.major.split(' ')[0], r.major];
      for (const kw of keywords) {
        if (text.includes(kw.replace(/0\d+\s*/, ''))) {
          const idx = text.indexOf(kw.replace(/0\d+\s*/, ''));
          const after = text.substring(idx + kw.length).replace(/[：:]\s*/, '').trim();
          const reason = after.split(/[，,。.；;]/)[0].trim();
          if (reason && reason.length > 1) r.reason = reason;
        }
      }
    }
  });
  saveData(appData);
  setTimeout(() => runStage2_validation(), 800);
}

function stage2_handleT2Input(text) {
  clearQuickReplies();
  // Simple: store as additional notes
  saveData(appData);
  setTimeout(() => runStage2_validation(), 800);
}

function stage2_generateInterpretation() {
  clearQuickReplies();
  const t1Considered = appData.t1Data.filter(r => r.consider === '是');
  setStage(2, 2);

  // Build T2 profile dict
  const t2 = {};
  appData.t2Data.forEach(item => {
    if (item.prefilledValue) t2[item.item] = item.prefilledValue;
  });

  // Extract T2 dimensions
  const likeSubjects = (t2['我喜欢的学科'] || '').split(/[,，、\s]+/).filter(Boolean);
  const hateSubjects = (t2['我不喜欢的学科'] || '').split(/[,，、\s]+/).filter(Boolean);
  const goodAt = (t2['我擅长做的事'] || '').split(/[,，、\s]+/).filter(Boolean);
  const badAt = (t2['我不擅长做的事'] || '').split(/[,，、\s]+/).filter(Boolean);
  const preferJob = t2['我倾向的职业'] || '';
  const avoidJob = t2['我拒绝的职业'] || '';
  const hobbies = t2['我的兴趣爱好'] || '';
  const hateEnv = t2['我不能忍受的环境/事物'] || '';

  const quickMoney = (t2['希望快速赚钱 or 越老越吃香'] || '').includes('快速');
  const slowGrowth = (t2['希望快速赚钱 or 越老越吃香'] || '').includes('越老越吃香');
  const wantStable = (t2['希望工作稳定 or 接受不稳定'] || '').includes('稳定');
  const acceptRisk = (t2['希望工作稳定 or 接受不稳定'] || '').includes('不稳定');
  const canWorkHard = (t2['可以很努力 or 工作轻松'] || '').includes('努力');
  const wantEasy = (t2['可以很努力 or 工作轻松'] || '').includes('轻松');
  const wantDignity = (t2['接受工作环境恶劣 or 要体面'] || '').includes('体面');
  const wantBarrier = (t2['希望工作有壁垒 or 开放竞争'] || '').includes('壁垒');
  const acceptOpen = (t2['希望工作有壁垒 or 开放竞争'] || '').includes('开放');
  const careSocial = (t2['在意社会意义 or 不在意'] || '').includes('在意');

  const needIndependence = (t2['家庭需要我尽快独立吗'] || '').includes('是') || (t2['家庭需要我尽快独立吗'] || '').includes('尽快');

  // Generate overview
  let msg = '好的，读完了你的T1和T2。<br><br>';
  msg += '<strong>你在T1选了' + t1Considered.length + '个专业类：</strong><br>';

  // T2 summary badge
  const t2Filled = Object.keys(t2).length;
  if (t2Filled >= 10) {
    msg += '<br>你的T2画像比较完整（' + t2Filled + '项），我可以做较深入的分析。<br><br>';
  } else if (t2Filled >= 4) {
    msg += '<br>你的T2画像有' + t2Filled + '项，分析有一定参考价值。<br><br>';
  } else {
    msg += '<br>你的T2画像填写较少，建议回到T2完善后再看分析。<br><br>';
  }
  msg += '<hr class="section-divider">';

  // Analyze each major with data-driven matching
  t1Considered.forEach(r => {
    const major = r.major;
    const intro = r.intro;
    const reason = r.reason || '未说明（可在T1补充）';
    const kw = r.caution || '';
    const catName = r.cat || '';

    let match = [];

    // -- 1. 学科匹配度检测 --
    const requiredSubjects = getMajorRequiredSubjects(major);
    const likedMatches = requiredSubjects.filter(s => likeSubjects.includes(s));
    const hatedConflicts = requiredSubjects.filter(s => hateSubjects.includes(s));

    if (likedMatches.length > 0) {
      match.push('✅ 你喜欢的' + likedMatches.join('、') + '是该专业核心基础');
    }
    if (hatedConflicts.length > 0) {
      match.push('❌ <strong>硬伤</strong>：专业需要' + hatedConflicts.join('、') + '，但T2标注为不喜欢');
    }

    // -- 2. 培养周期 vs 经济约束 --
    const isLongCycle = /临床|口腔|基础医学|中医学|中西医|法医学/.test(major);
    const isMediumCycle = /法学|建筑|药学/.test(major);
    if (isLongCycle && needIndependence) {
      match.push('❌ 冲突：' + major.replace(/^\d+\s*/, '') + '培养周期长(5+3年)，但T2需要尽快独立');
    } else if (isMediumCycle && needIndependence) {
      match.push('⚠️ ' + major.replace(/^\d+\s*/, '') + '成长周期较长，与"尽快独立"存在一定矛盾');
    }

    // -- 3. 收入速度匹配 --
    const isHighPay = /计算机|软件|人工智能|电子信息|通信|电气|金融/.test(major);
    const isSlowIncome = /临床|口腔|基础医学|中医学|药学|法学|建筑/.test(major);
    const isLowPay = /工商管理|公共管理|旅游|图书|档案|中文|历史|哲学|新闻/.test(major);

    if (isHighPay && quickMoney) match.push('✅ IT/电子类薪资起点高，与"快速赚钱"倾向匹配');
    if (isSlowIncome && quickMoney) match.push('⚠️ 该专业前期收入较低，与"快速赚钱"倾向存在张力');
    if (isSlowIncome && slowGrowth) match.push('✅ 该专业越老越吃香，与"越老越吃香"倾向匹配');
    if (quickMoney && (major.includes('师范') || major.includes('教育'))) match.push('⚠️ 师范类薪资增长慢，与"快速赚钱"倾向有差距');

    // -- 4. 稳定性匹配 --
    const isStable = /师范|教育|医学|电气|水利|土木|公务员|公共管理|公安/.test(major);
    const isUnstable = /创业|艺术|影视|音乐|美术|设计/.test(major);

    if (isStable && wantStable) match.push('✅ 该专业就业稳定，与"希望稳定"倾向匹配');
    if (isUnstable && wantStable) match.push('⚠️ 该专业就业不确定性高，与"希望稳定"倾向存在张力');
    if (isUnstable && acceptRisk) match.push('✅ 该专业高风险高回报，与"接受不稳定"倾向匹配');

    // -- 5. 职业壁垒/体面度 --
    if ((/医学|法律|法学/.test(major) || major.includes('师范')) && wantBarrier) {
      match.push('✅ 该专业有明确的职业壁垒（执业证/编制），不易被替代');
    }
    if ((/医学|法律|法学/.test(major) || major.includes('师范') || major.includes('金融')) && wantDignity) {
      match.push('✅ 该专业社会认可度高，体面');
    }
    if ((/环境|材料|化工|生物工程|农学|采矿|地质/.test(major)) && wantDignity) {
      match.push('⚠️ 该专业工作环境可能不被认为"体面"，与T2体面倾向有冲突');
    }

    // -- 6. 工作强度 --
    if ((/计算机|软件|临床|医学|土木|建筑/.test(major)) && wantEasy) {
      match.push('⚠️ 该专业工作强度较大（996/夜班/工地），与"偏好轻松"倾向有冲突');
    }
    if ((/计算机|软件|临床|医学/.test(major)) && canWorkHard) {
      match.push('✅ 该专业需要投入大量精力，你T2表示可以努力');
    }

    // -- 7. 社会意义 --
    const hasSocialMeaning = /医学|教育|师范|环境|法学|公安|公共管理|社会/.test(major);
    if (hasSocialMeaning && careSocial) match.push('✅ 该专业社会意义强，与"在意社会意义"匹配');
    if (hasSocialMeaning && quickMoney) match.push('⚠️ 该专业虽有意义但收入增长较慢');

    // -- 8. 专业特有风险提示 --
    if (kw.includes('天坑')) match.push('⚠️ ' + kw);
    else if (kw) match.push('📌 ' + kw);

    // -- 9. 行业趋势 --
    const isHot = /计算机|人工智能|大数据|软件|电子信息|新能源|半导体/.test(major);
    const isDeclining = /土木|建筑|材料|环境|新闻|工商管理/.test(major);
    if (isHot) match.push('📈 该专业处于行业上升期，需求稳定增长');
    if (isDeclining) match.push('📉 该专业所属行业近年面临结构性调整，需关注就业市场变化');

    // -- 10. 选科硬过滤（对齐 SKILL.md 推荐流水线第1步） --
    const subjCheck = checkSubjectCompatibility(appData.subjects, appData.examType, r.cat);
    if (!subjCheck.compatible) {
      match.push('🚫 <strong style="color:var(--danger)">选科不兼容：</strong>' + subjCheck.reason);
    } else if (subjCheck.reason) {
      match.push('⚠️ ' + subjCheck.reason);
    }

    if (match.length === 0) {
      match.push('📝 根据你的T2画像，请进一步了解该专业的具体课程、就业方向和培养方案');
    }

    msg += '<div class="msg-content-block">';
    msg += '<strong>' + r.major + '</strong> — ' + intro + '<br>';
    msg += '📌 你的选择原因：' + reason;
    if (kw) msg += '<br><span style="color:var(--warning)">⚠️ 模板提示：' + kw + '</span>';
    msg += '<br>';
    msg += '<strong>📊 结合T2画像的匹配分析：</strong><br>' + match.join('<br>');
    msg += '</div>';
  });

  msg += '<hr class="section-divider">';
  msg += '接下来进入探索环节。在我帮你圈定候选学校之前，你可以先问我几个问题想清楚，比如：<br><br>';
  msg += '1️⃣ 这几个专业，哪个更值得用你的位次去冲？<br>';
  msg += '2️⃣ 你倾向去哪些城市或区域？<br>';
  msg += '3️⃣ 有没有特别想去、或者想排除的学校？<br>';
  msg += '4️⃣ 你的位次查到了吗？这是后面冲稳保判定的关键数据。<br><br>';
  msg += '想清楚了，直接说<strong>"帮我出候选名单"</strong>。';

  addAIMessage(msg, [
    {text:'帮我出候选名单', primary:true},
    {text:'我还有问题要问'}
  ]);
  setStage(3, 0);
  window._quickReplyHandler = (idx) => {
    if (idx === 0) { setStage(4, 0); runStage4(0); }
    else { runStage3(0); }
  };
  window._messageHandler = (text) => {
    if (text.includes('候选') || text.includes('名单')) { setStage(4, 0); runStage4(0); }
    else { runStage3(0); }
  };
}

// ---- Stage 3: 对话探索（对齐 SKILL.md 深度交流） ----
function runStage3(step) {
  if (step === 0) {
    // Step 0: 展示已有信息 + 引导 Top 3 专业优先级确认
    const t1Considered = appData.t1Data.filter(r => r.consider === '是');
    const t2Filled = appData.t2Data.filter(item => item.prefilledValue && item.prefilledValue.trim());
    const t2GroupFilled = [...new Set(t2Filled.map(item => item.group))];

    let msg = '<strong>🗺️ 探索环节 — 帮你把偏好想清楚</strong><br><br>';
    msg += '在我圈定候选学校之前，先帮你把几个关键问题理清楚。<br><br>';

    if (t1Considered.length > 0) {
      msg += '<strong>📋 你已选择的专业类：</strong><br>';
      t1Considered.forEach(r => {
        msg += `· ${r.major}：${r.intro}`;
        if (r.reason) msg += `（原因：${r.reason}）`;
        msg += '<br>';
      });
      msg += '<br>';

      if (t1Considered.length >= 3) {
        msg += '<strong>👉 请你排一下 Top 3 优先级：</strong>在你选的这些专业里，哪 3 个你最想读？（按 1→2→3 排序）<br>';
        msg += '比如回复："1法学 2电子信息 3计算机"<br><br>';
      }
    }

    if (t2GroupFilled.length > 0) {
      msg += '<strong>📊 T2画像已覆盖：</strong>' + t2GroupFilled.join('、') + '<br>';
      if (t2GroupFilled.length < 4) {
        msg += '（还差 ' + (4 - t2GroupFilled.length) + ' 组，接下来我帮你补充）<br>';
      }
      msg += '<br>';
    }

    msg += '<strong>📍 第一个问题：你倾向去哪些城市或区域？</strong><br>';
    msg += '（比如：上海、长三角、珠三角、京津冀、成都/重庆、武汉/长沙、不回东北…）';

    addAIMessage(msg, [
      {text:'想去一线城市'},{text:'想去长三角/珠三角'},
      {text:'不挑城市，学校好就行'},{text:'帮我出候选名单', primary:true}
    ]);
    setStage(3, 0);
    window._quickReplyHandler = (idx) => {
      if (idx === 3) { stage3_gotoStage4(); return; }
      const prefs = ['一线城市','长三角/珠三角','不挑城市'];
      appData.cityPrefs = prefs[idx];
      saveData(appData);
      stage3_step1();
    };
    window._messageHandler = (text) => {
      if (text.includes('候选') || text.includes('名单')) { stage3_gotoStage4(); return; }
      // Capture Top 3 if present
      const top3Match = text.match(/(\d)\s*[.、]?\s*([^，,\d\s]+)/g);
      if (top3Match && top3Match.length >= 3) {
        const top3 = top3Match.slice(0,3).map(m => m.replace(/^\d\s*[.、]?\s*/, ''));
        appData.top3Majors = top3;
        saveData(appData);
        addAIMessage(`✅ 已记录 Top 3：${top3.join(' > ')}。<br>接下来——`);
        setTimeout(() => stage3_step1(), 800);
        return;
      }
      if (text.includes('专业') || text.includes('学校')) {
        // Free response about schools/majors — save and continue
        if (!appData.freeChatPrefs) appData.freeChatPrefs = [];
        appData.freeChatPrefs.push(text);
      }
      appData.cityPrefs = text;
      saveData(appData);
      stage3_step1();
    };
  } else if (step === 1) {
    stage3_step1();
  } else if (step === 2) {
    stage3_step2();
  }
}

function stage3_step1() {
  let msg = appData.cityPrefs
    ? `好的，城市倾向：<strong>${appData.cityPrefs}</strong>。<br><br>`
    : '';

  msg += '<strong>🏫 第二个问题：有没有特别想去（或想排除）的学校？</strong><br>';
  msg += '比如：想去985/211，排除中外合作办学，不想去民办院校…<br>';
  msg += '或者直接说"厦门大学"、"排除XX大学"等具体学校名。';

  addAIMessage(msg, [
    {text:'想去985/211'},{text:'排除中外合作'},
    {text:'没有偏好'},{text:'帮我出候选名单', primary:true}
  ]);
  setStage(3, 1);
  window._quickReplyHandler = (idx) => {
    if (idx === 3) { stage3_gotoStage4(); return; }
    const prefs = ['985/211','排除中外合作','无偏好'];
    appData.schoolPrefs = prefs[idx];
    saveData(appData);
    stage3_step2();
  };
  window._messageHandler = (text) => {
    if (text.includes('候选') || text.includes('名单')) { stage3_gotoStage4(); return; }
    appData.schoolPrefs = text;
    saveData(appData);
    stage3_step2();
  };
}

function stage3_step2() {
  let msg = appData.schoolPrefs
    ? `好的，院校偏好：<strong>${appData.schoolPrefs}</strong>。<br><br>`
    : '';

  msg += '<strong>💰 最后确认：经济与规划方面</strong><br>';
  msg += '· 学费预算有上限吗？（比如不接受2万/年以上）<br>';
  msg += '· 是否考虑考研/出国？（影响选校策略）<br>';
  msg += '· 还有其他我需要注意的吗？<br><br>';
  msg += '这些都清楚了，我就帮你出候选名单。';

  addAIMessage(msg, [
    {text:'没有特殊要求'},{text:'帮我出候选名单', primary:true}
  ]);
  setStage(3, 2);
  window._quickReplyHandler = (idx) => {
    if (idx === 0) {
      appData.futurePlan = '无特殊要求';
      saveData(appData);
    }
    stage3_gotoStage4();
  };
  window._messageHandler = (text) => {
    if (text.includes('候选') || text.includes('名单')) { stage3_gotoStage4(); return; }
    appData.futurePlan = text;
    saveData(appData);
    stage3_gotoStage4();
  };
}

function stage3_gotoStage4() {
  // Summarize Stage 3 collected preferences
  let summary = '好的，我帮你整理一下目前的信息：<br><br>';
  if (appData.top3Majors && appData.top3Majors.length > 0) {
    summary += `📚 Top 3 专业：${appData.top3Majors.join(' > ')}<br>`;
  }
  if (appData.cityPrefs) summary += `📍 城市倾向：${appData.cityPrefs}<br>`;
  if (appData.schoolPrefs) summary += `🏫 院校偏好：${appData.schoolPrefs}<br>`;
  if (appData.futurePlan) summary += `💰 经济规划：${appData.futurePlan}<br>`;
  summary += '<br>现在帮你生成候选名单——';

  addAIMessage(summary, [{text:'查看候选名单', primary:true}]);
  window._quickReplyHandler = () => { setStage(4, 0); runStage4(0); };
  window._messageHandler = () => { setStage(4, 0); runStage4(0); };
}

// ---- Stage 4: 候选草表 · 智能数据录入中心 ----
// T4 working list (in-memory, saved to appData.candidates on finalize)
let _t4Working = []; // [{name,city,tag,rank24,rank23,rank22,score24,plan,notes}] — rank24=专业组/专业录取位次（非院校整体位次）

function runStage4(step) {
  setStage(4, 0);
  clearQuickReplies();

  const t1Considered = appData.t1Data.filter(r => r.consider === '是');
  if (t1Considered.length === 0) {
    addAIMessage('出候选名单之前，需要你先在T1表里至少选1个考虑的专业类。<br><br>要打开T1表吗？', [
      {text:'打开T1表', primary:true}
    ]);
    window._quickReplyHandler = () => { openT1Modal(); };
    return;
  }

  const userRank = parseInt(appData.rank || '0');
  if (!userRank) {
    addAIMessage('<div class="msg-content-block warning"><strong>⚠️ 位次还没填。</strong><br>'
      + '位次是冲稳保判定的核心。请去省考试院查一分一段表后告诉我。</div>', [
      {text:'我先用估分继续'}
    ]);
    window._quickReplyHandler = () => { openT4Hub(); };
    window._messageHandler = (text) => {
      const m = text.match(/(\d[\d,]*)/);
      if (m) { appData.rank = m[1].replace(/,/g,''); saveData(appData); openT4Hub(); }
      else { openT4Hub(); }
    };
    return;
  }

  // Generate profile analysis before opening hub
  _profileCache = null; // Force regeneration
  generateProfileSummary();

  // Pre-populate working list from saved candidates
  loadT4WorkingFromSaved();
  openT4Hub();
}

function loadT4WorkingFromSaved() {
  if (appData.candidates.length > 0) {
    _t4Working = appData.candidates.map(c => ({
      name: c.name,
      city: c.city || '',
      tag: c.tag || '',
      tier: c.tag_ckwb || '',
      rank24: c._rankYear || '',
      rank23: '',
      rank22: '',
      score24: c._scoreYear || '',
      plan: c.plan || '',
      notes: c.notes || ''
    }));
  }
}

function openT4Hub() {
  addAIMessage('已打开<strong>画像驱动智能搜索中心</strong>。<br>'
    + '系统已分析你的T1专业选择 + T2个人画像，准备好为你推荐院校。<br><br>'
    + '• 🧬 <strong>画像智能搜索</strong>：AI 读取你的画像，联网搜索冲/稳/保院校<br>'
    + '• 📎 手动搜索链接：AI搜索不稳定时备用<br>'
    + '• 📋 批量粘贴解析：手动搜索后可批量导入<br>'
    + '• 📊 实时预览k值和冲稳保分类',
    [{text:'📊 打开智能搜索中心', primary:true}]
  );
  window._quickReplyHandler = () => { showSearchHub(); };
  window._messageHandler = (text) => {
    // If user pastes raw data directly, try to parse
    const parsed = parseSchoolData(text);
    if (parsed.length > 0) {
      parsed.forEach(p => _t4Working.push(p));
      addAIMessage('✅ 已从你粘贴的内容中解析出 <strong>' + parsed.length + '</strong> 条院校数据。<br>要打开录入中心确认吗？', [
        {text:'打开录入中心确认', primary:true}
      ]);
      window._quickReplyHandler = () => { showSearchHub(); };
    } else {
      showSearchHub();
    }
  };
}

// ====== T1+T2 综合画像分析引擎 ======
// 在进入阶段四时调用，生成驱动智能搜索的学生画像
let _profileCache = null; // 缓存最近一次分析结果

function generateProfileSummary(userText) {
  const t1Considered = appData.t1Data.filter(r => r.consider === '是');
  const userRank = parseInt(appData.rank) || 0;
  const userScore = parseInt(appData.totalScore) || 0;
  const province = appData.province || '';
  const subjects = appData.subjects || '';
  const restrictions = appData.restrictions || '';

  // 构建 T2 画像字典
  const t2 = {};
  appData.t2Data.forEach(item => {
    if (item.prefilledValue && item.prefilledValue.trim()) {
      t2[item.item] = item.prefilledValue.trim();
    }
  });

  // ===== 1. 城市偏好分析 =====
  let citySummary = '';
  const stayLocal = t2['留在本地 or 外地'] || '';
  const bigCity = t2['发达城市机会多 or 小城市压力小'] || '';
  const userCityPref = appData.cityPrefs || '';

  if (stayLocal.includes('外地')) citySummary += '倾向外地发展；';
  else if (stayLocal.includes('本地')) citySummary += '倾向留在本地；';
  if (bigCity.includes('大城市') || bigCity.includes('发达')) citySummary += '偏好发达/大城市；';
  else if (bigCity.includes('小城市')) citySummary += '偏好小城市低压生活；';
  if (userCityPref) citySummary += '用户指定偏好城市：' + userCityPref + '；';
  if (!citySummary) citySummary = '城市偏好未明确填写；';

  // ===== 2. 经济约束分析 =====
  let econSummary = '';
  const canStudyAbroad = (t2['家庭支持我出国吗'] || '').includes('是');
  const canStudyPostgrad = (t2['家庭支持我读研吗'] || '').includes('是');
  const needIndependence = (t2['家庭需要我尽快独立吗'] || '').includes('是') || (t2['家庭需要我尽快独立吗'] || '').includes('尽快');

  if (!canStudyAbroad) econSummary += '不支持出国；';
  if (!canStudyPostgrad) econSummary += '不支持读研，建议本科就业导向；';
  else econSummary += '支持读研；';
  if (needIndependence) econSummary += '需要尽快经济独立；';
  if (!econSummary) econSummary = '经济情况未明确填写；';

  // ===== 3. 学科能力分析 =====
  let subjectSummary = '';
  const likeSubjects = (t2['我喜欢的学科'] || '').split(/[,，、\s]+/).filter(Boolean);
  const hateSubjects = (t2['我不喜欢的学科'] || '').split(/[,，、\s]+/).filter(Boolean);
  const goodAt = (t2['我擅长做的事'] || '').split(/[,，、\s]+/).filter(Boolean);
  const badAt = (t2['我不擅长做的事'] || '').split(/[,，、\s]+/).filter(Boolean);

  if (likeSubjects.length > 0) subjectSummary += '喜欢学科：' + likeSubjects.join('、') + '；';
  if (hateSubjects.length > 0) subjectSummary += '不喜欢学科：' + hateSubjects.join('、') + '；';
  if (goodAt.length > 0) subjectSummary += '擅长：' + goodAt.join('、') + '；';
  if (badAt.length > 0) subjectSummary += '不擅长：' + badAt.join('、') + '；';
  if (!subjectSummary) subjectSummary = '学科偏好未明确填写；';

  // ===== 4. 职业&价值倾向分析 =====
  let careerSummary = '';
  const preferJob = t2['我倾向的职业'] || '';
  const avoidJob = t2['我拒绝的职业'] || '';
  const hobbies = t2['我的兴趣爱好'] || '';
  const hateEnv = t2['我不能忍受的环境/事物'] || '';
  const socialMeaning = t2['在意社会意义 or 不在意'] || '';
  const quickMoney = (t2['希望快速赚钱 or 越老越吃香'] || '');
  const wantStable = (t2['希望工作稳定 or 接受不稳定'] || '');
  const workHard = (t2['可以很努力 or 工作轻松'] || '');
  const wantDignity = (t2['接受工作环境恶劣 or 要体面'] || '');
  const wantBarrier = (t2['希望工作有壁垒 or 开放竞争'] || '');

  if (preferJob) careerSummary += '倾向职业：' + preferJob + '；';
  if (avoidJob) careerSummary += '拒绝职业：' + avoidJob + '；';
  if (hobbies) careerSummary += '兴趣：' + hobbies + '；';
  if (hateEnv) careerSummary += '不能忍受：' + hateEnv + '；';
  if (socialMeaning.includes('在意')) careerSummary += '在意社会意义；';
  if (quickMoney.includes('快速')) careerSummary += '希望快速赚钱；';
  else if (quickMoney.includes('越老越吃香')) careerSummary += '接受越老越吃香（前期收入低也可以）；';
  if (wantStable.includes('稳定')) careerSummary += '希望工作稳定；';
  else if (wantStable.includes('不稳定')) careerSummary += '接受不稳定/高风险高回报；';
  if (workHard.includes('努力')) careerSummary += '可以很努力投入工作；';
  else if (workHard.includes('轻松')) careerSummary += '偏好工作强度适中；';
  if (wantDignity.includes('体面')) careerSummary += '需要职业体面；';
  if (wantBarrier.includes('壁垒')) careerSummary += '希望职业有壁垒（不易被替代）；';
  else if (wantBarrier.includes('开放')) careerSummary += '接受开放竞争环境；';
  if (!careerSummary) careerSummary = '职业偏好未明确填写；';

  // ===== 5. MBTI/霍兰德 =====
  let testSummary = '';
  const mbti = t2['MBTI'] || '';
  const holland = t2['霍兰德职业测评'] || '';
  if (mbti) testSummary += 'MBTI：' + mbti + '；';
  if (holland) testSummary += '霍兰德：' + holland + '；';

  // ===== 6. 专业选择汇总 =====
  let majorSummary = '';
  if (t1Considered.length > 0) {
    majorSummary = 'T1选中' + t1Considered.length + '个专业类：';
    t1Considered.forEach((r, i) => {
      majorSummary += (i > 0 ? '、' : '') + r.major.replace(/^\d+\s*/, '');
      if (r.reason && r.reason.trim()) majorSummary += '（原因：' + r.reason.trim() + '）';
    });

    // Top 3
    if (appData.top3Majors && appData.top3Majors.length > 0) {
      majorSummary += '；Top3优先：' + appData.top3Majors.join('、');
    }
  }

  // ===== 7. T1专业 ↔ T2画像冲突检测 =====
  let conflictSummary = '';
  const conflictWarnings = [];
  t1Considered.forEach(r => {
    const m = r.major;
    // 检测学科冲突
    if (hateSubjects.length > 0) {
      const majorNeedsSubjects = getMajorRequiredSubjects(m);
      const conflicts = majorNeedsSubjects.filter(s => hateSubjects.includes(s));
      if (conflicts.length > 0) {
        conflictWarnings.push('⚠️ ' + m.replace(/^\d+\s*/, '') + '需要' + conflicts.join('、') + '但T2标注为不喜欢');
      }
    }
    // 检测培养周期 vs 经济约束
    const isLongCycle = /临床|口腔|基础医学|中医学/.test(m);
    if (isLongCycle && needIndependence) {
      conflictWarnings.push('⚠️ ' + m.replace(/^\d+\s*/, '') + '培养周期长(5+3年)但T2标注需要尽快独立');
    }
    // 检测风险偏好冲突
    const isRisky = /生物|环境|材料|化工/.test(m) && /天坑/.test(r.caution || '');
    if (isRisky && wantStable.includes('稳定')) {
      conflictWarnings.push('⚠️ ' + m.replace(/^\d+\s*/, '') + '就业风险偏高但T2标注偏好稳定');
    }
  });
  if (conflictWarnings.length > 0) {
    conflictSummary = conflictWarnings.join('\n');
  }

  // ===== 8. k值区间计算（正确方向：位次越小=学校越好；必须使用专业组/专业位次，不可用院校整体最低位次） =====
  let kSummary = '';
  if (userRank > 0) {
    const defTol = appData.deficitTolerance || '适中(亏10%)';
    // 冲：专业组位次应比用户好 → 更小的数值 → k < 0.95
    const chongMax = Math.round(userRank * 0.95);   // 冲上限=接近用户位次
    const chongMin = Math.round(userRank * 0.50);    // 冲下限=亏50%太激进的不推
    // 稳：专业组位次与用户接近 → 0.95 ≤ k ≤ 1.08
    const wenMax = Math.round(userRank * 1.08);      // 稳上限=略低于用户
    const wenMin = Math.round(userRank * 0.95);      // 稳下限=略高于用户
    // 保：专业组位次比用户差 → 更大的数值 → k > 1.08
    const baoMax = Math.round(userRank * 1.80);      // 保上限=差距太大也没意义
    const baoMin = Math.round(userRank * 1.08);      // 保下限=刚过稳线
    kSummary = '用户省排名约' + userRank.toLocaleString()
      + '（分数约' + (userScore || '?') + '），亏分容忍：' + defTol + '。\n'
      // 注意：位次数值越小学校越好！冲=更小位次，保=更大位次；必须使用专业组/专业位次
      + '冲(k<0.95)：专业组录取位次应 ≤ ' + chongMax.toLocaleString() + '（比用户好），最低考虑' + chongMin.toLocaleString() + '\n'
      + '稳(k=0.95~1.08)：专业组位次在' + wenMin.toLocaleString() + '~' + wenMax.toLocaleString() + '\n'
      + '保(k>1.08)：专业组位次应 ≥ ' + baoMin.toLocaleString() + '（比用户差），最高到' + baoMax.toLocaleString();
  }

  // ===== 构建完整画像摘要 =====
  let summary = '【学生综合画像分析】\n';
  summary += '基本信息：' + province + ' | ' + (appData.examType || '') + ' | 选科：' + (subjects || '未填') + '\n';
  if (kSummary) summary += kSummary + '\n\n';
  summary += '【专业意向】\n' + majorSummary + '\n\n';
  summary += '【城市偏好】\n' + citySummary + '\n\n';
  summary += '【经济约束】\n' + econSummary + '\n\n';
  summary += '【学科能力】\n' + subjectSummary + '\n\n';
  summary += '【职业&价值倾向】\n' + careerSummary + '\n';
  if (testSummary) summary += '【评测参考】\n' + testSummary + '\n';
  if (conflictSummary) summary += '\n【⚠️ 风险提示】\n' + conflictSummary + '\n';

  // 缓存
  _profileCache = { summary, t1Considered, t2, conflictWarnings, userRank, userScore, province };

  return summary;
}

// 根据专业类名推断需要的学科
function getMajorRequiredSubjects(major) {
  const mapping = {
    '计算机': ['数学', '物理'], '软件': ['数学'], '人工智能': ['数学', '物理'],
    '电子信息': ['物理', '数学'], '通信': ['物理', '数学'], '电气': ['物理', '数学'],
    '机械': ['物理', '数学'], '自动化': ['物理', '数学'], '仪器': ['物理'],
    '土木': ['物理', '数学'], '建筑': ['物理', '美术'], '水利': ['物理'],
    '临床': ['生物', '化学'], '口腔': ['生物', '化学'], '基础医学': ['生物', '化学'],
    '药学': ['化学', '生物'], '中药': ['化学', '生物'], '护理': ['生物', '化学'],
    '数学': ['数学'], '物理': ['物理', '数学'], '化学': ['化学', '数学'],
    '生物': ['生物', '化学'], '统计': ['数学'], '心理': ['生物'],
    '材料': ['化学', '物理'], '化工': ['化学'], '环境': ['化学', '生物'],
    '食品': ['化学', '生物'], '生物工程': ['生物', '化学'],
    '法学': ['政治'], '经济': ['数学'], '金融': ['数学'],
    '航空航天': ['物理', '数学'],
    '地理': ['地理'], '地质': ['地理', '化学'],
    '外语': ['英语'], '中文': ['语文'], '新闻': ['语文'],
    '艺术': [], '音乐': [], '美术': [], '设计': [], '体育': []
  };
  for (const [key, subjects] of Object.entries(mapping)) {
    if (major.includes(key)) return subjects;
  }
  return [];
}

let _smartSearchActive = false;

async function smartSearch() {
  if (_smartSearchActive) return;
  _smartSearchActive = true;

  const btn = document.getElementById('t4SmartSearchBtn');
  const resultEl = document.getElementById('t4SmartSearchResult');

  // === 检查火山引擎 Ark Bot 是否已配置 ===
  const cfg = window.APP_CONFIG || {};
  const botId = cfg.botId || '';
  const apiKey = cfg.apiKey || '';
  if (!botId || botId === 'bot-你的BotID' || !apiKey || apiKey === '你的APIKey') {
    resultEl.style.display = 'block';
    resultEl.innerHTML = '<div class="search-status warning">'
      + '<strong>🔧 智能搜索未配置</strong><br>'
      + '<span style="font-size:12px;">需要在火山引擎创建联网搜索 Bot。<br>'
      + '配置方法请查看 <code>worker/volcano-bot-guide.md</code>，只需 5 分钟。<br><br>'
      + '目前可以：<br>'
      + '① 点击 <strong>"📎 手动搜索链接"</strong> 打开搜索结果复制回来<br>'
      + '② 使用下方的 <strong>"📋 批量粘贴解析"</strong> 文本框</span>'
      + '</div>';
    _smartSearchActive = false;
    return;
  }

  // ===== 生成或使用缓存的学生画像 =====
  if (!_profileCache) {
    generateProfileSummary();
  }
  const profile = _profileCache;
  const userRank = profile.userRank || null;
  const userScore = profile.userScore || null;
  const province = profile.province || '';
  const examType = appData.examType || '';

  if (!userRank) {
    resultEl.style.display = 'block';
    resultEl.innerHTML = '<div style="color:var(--warning);padding:8px;">⚠️ 请先在基础信息中填写<strong>省排名（位次）</strong>，这是冲稳保判定的核心数据。</div>';
    _smartSearchActive = false;
    return;
  }

  // ===== 计算冲稳保位次区间（修正：位次越小=学校越好） =====
  // 冲=学校位次低于用户（更好但难进）  稳=位次接近  保=位次高于用户（更易进）
  const chongMax = Math.round(userRank * 0.95);   // 冲上限：接近用户水平
  const chongMin = Math.round(userRank * 0.50);    // 冲下限：不推荐差距太大的"送死"选项
  const wenMax   = Math.round(userRank * 1.08);    // 稳上限：略低于用户
  const wenMin   = Math.round(userRank * 0.95);    // 稳下限：略高于用户
  const baoMax   = Math.round(userRank * 1.80);    // 保上限：太低也没参考价值
  const baoMin   = Math.round(userRank * 1.08);    // 保下限：刚过稳线
  // 分数区间（用于辅助AI搜索）
  const scoreRangeLow = Math.max(userScore - 30, 400);
  const scoreRangeHigh = Math.min(userScore + 20, 700);

  // UI: searching state
  btn.disabled = true;
  btn.textContent = '⏳ AI 分析画像 + 搜索中...';
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<div class="search-status searching">'
    + '<div class="spinner"></div>'
    + '<span>DeepSeek 正在分析你的画像 + 联网搜索院校数据...</span>'
    + '<div style="font-size:10px;color:var(--text-muted);margin-top:4px;">'
    + '搜索冲/稳/保三个档位约需 10-25 秒，请耐心等待</div>'

对每所学校标注它的录取分数和位次（必须是实数数字），我来根据学生位次（${userRank.toLocaleString()}）和学校位次算k值分类。

===== 返回格式（严格JSON数组，不要markdown标记） =====
[{

**硬性要求**：
